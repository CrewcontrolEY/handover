<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crew Services — Day of Ops Workflow</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#080f1a;color:#e2e8f0;font-family:"Segoe UI",system-ui,sans-serif;min-height:100vh;}
body.light-mode{background:#f1f5f9;color:#1e293b;}

header{background:#0d1b2e;border-bottom:1px solid #1e2d45;padding:10px 20px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:100;flex-wrap:wrap;}
body.light-mode header{background:#fff;border-color:#e2e8f0;}
.hdr-title{font-size:15px;font-weight:700;color:#e2e8f0;flex:1;}
body.light-mode .hdr-title{color:#1e293b;}
.hdr-sub{font-size:10px;color:#64748b;letter-spacing:.06em;text-transform:uppercase;display:block;}
.hdr-btn{background:#1e2d45;border:1px solid #334155;color:#94a3b8;border-radius:7px;padding:6px 14px;font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s;}
.hdr-btn:hover{background:#334155;color:#e2e8f0;}
body.light-mode .hdr-btn{background:#f1f5f9;border-color:#e2e8f0;color:#64748b;}
body.light-mode .hdr-btn:hover{background:#e2e8f0;color:#1e293b;}
.hdr-btn.edit-active{background:#b45309;border-color:#d97706;color:#fff;}
.hdr-btn.back-main{background:linear-gradient(135deg,#0f2a45,#1e3a5f);border-color:#0ea5e9;color:#38bdf8;}
.hdr-btn.back-main:hover{background:#0ea5e9;color:#fff;}

/* Theme toggle */
.theme-toggle-wrap{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.theme-icon{font-size:13px;line-height:1;}
.theme-toggle{position:relative;width:38px;height:20px;flex-shrink:0;}
.theme-toggle input{opacity:0;width:0;height:0;position:absolute;}
.theme-toggle-slider{position:absolute;inset:0;background:#1a2236;border:1px solid #1e2d45;border-radius:999px;cursor:pointer;transition:background .25s,border-color .25s;}
.theme-toggle-slider::before{content:'';position:absolute;width:14px;height:14px;left:2px;top:50%;transform:translateY(-50%);background:#64748b;border-radius:50%;transition:transform .25s,background .25s;}
.theme-toggle input:checked + .theme-toggle-slider{background:rgba(0,212,255,.15);border-color:rgba(0,212,255,.5);}
.theme-toggle input:checked + .theme-toggle-slider::before{transform:translateX(18px) translateY(-50%);background:#00d4ff;}

/* Search */
.search-bar{padding:10px 20px;background:#0a1628;border-bottom:1px solid #1e2d45;}
body.light-mode .search-bar{background:#f8fafc;border-color:#e2e8f0;}
.search-bar input{width:100%;max-width:480px;background:#0d1b2e;border:1px solid #1e2d45;border-radius:8px;padding:8px 14px;color:#e2e8f0;font-size:12px;font-family:inherit;outline:none;}
body.light-mode .search-bar input{background:#fff;border-color:#c8d8ea;color:#1e293b;}
.search-bar input:focus{border-color:#0ea5e9;}
.search-bar input::placeholder{color:#475569;}

/* Layout */
.layout{display:flex;min-height:calc(100vh - 95px);}

/* Sidebar */
.sidebar{width:200px;flex-shrink:0;background:#0a1628;border-right:1px solid #1e2d45;padding:8px 6px;overflow-y:auto;display:flex;flex-direction:column;}
body.light-mode .sidebar{background:#fff;border-color:#e2e8f0;}
body:not(.edit-mode) .sidebar{display:none;}
.sidebar-main{flex:1;}
.cat-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:10px 8px 3px;}
.sheet-btn{display:flex;align-items:center;width:100%;text-align:left;background:transparent;border:none;border-left:3px solid transparent;color:#94a3b8;font-size:11px;font-family:inherit;padding:5px 8px;cursor:pointer;gap:4px;transition:all .12s;}
.sheet-btn:hover{background:#1e2d45;color:#e2e8f0;border-left-color:#334155;}
body.light-mode .sheet-btn:hover{background:#f1f5f9;color:#1e293b;}
.sheet-btn.active{background:#0f2a45;color:#38bdf8;font-weight:600;border-left-color:#0ea5e9;}
body.light-mode .sheet-btn.active{background:#e0f2fe;color:#0284c7;border-left-color:#0284c7;}
.sheet-btn-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sheet-btn-del{font-size:10px;color:#ef4444;display:none;background:none;border:none;cursor:pointer;padding:0 2px;flex-shrink:0;}
.edit-mode .sheet-btn-del{display:block;}
.cat-rename-btn{background:none;border:1px solid #334155;color:#64748b;border-radius:5px;font-size:10px;padding:1px 7px;cursor:pointer;font-family:inherit;}
.cat-rename-btn:hover{color:#e2e8f0;border-color:#0ea5e9;}
body.light-mode .cat-rename-btn{border-color:#c8d8ea;color:#64748b;}
.add-sheet-btn{display:none;width:calc(100% - 4px);background:transparent;border:1px dashed #334155;border-radius:5px;color:#64748b;font-size:10px;cursor:pointer;padding:4px;font-family:inherit;margin:3px 2px;}
.edit-mode .add-sheet-btn{display:block;}
.history-tab-btn{display:none;background:#1a0f00;border:1px solid #92400e;border-radius:6px;color:#d97706;font-size:11px;cursor:pointer;padding:8px 10px;font-family:inherit;text-align:left;font-weight:600;margin:8px 2px 2px;}
.edit-mode .history-tab-btn{display:block;}
.history-tab-btn.active{background:#d97706;color:#fff;}

/* Main */
.main{flex:1;padding:20px;overflow-y:auto;min-width:0;}

/* Welcome */
.welcome{text-align:center;padding:50px 20px;color:#475569;}
.welcome h3{font-size:17px;color:#64748b;margin-bottom:6px;}
.cat-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-top:16px;text-align:left;}
.cat-card{background:#0d1b2e;border:1px solid #1e2d45;border-radius:10px;padding:12px;cursor:pointer;transition:all .15s;}
body.light-mode .cat-card{background:#fff;border-color:#e2e8f0;}
.cat-card:hover{transform:translateY(-2px);}
.cat-card-title{font-size:12px;font-weight:700;color:#e2e8f0;margin-bottom:3px;}
body.light-mode .cat-card-title{color:#1e293b;}
.cat-card-count{font-size:10px;color:#64748b;}

/* Sheet */
.sheet-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #1e2d45;}
body.light-mode .sheet-header{border-color:#e2e8f0;}
.sheet-title{font-size:16px;font-weight:700;flex:1;}
.sheet-cat{font-size:10px;color:#64748b;text-transform:uppercase;}

/* Edit toolbar - light colours so content stays visible */
.edit-toolbar{display:none;background:#fffbeb;border:1px solid #d97706;border-radius:8px;padding:10px 14px;margin-bottom:12px;gap:8px;flex-wrap:wrap;align-items:center;}
body:not(.light-mode) .edit-toolbar{background:#2d1f00;border-color:#d97706;}
.edit-mode .edit-toolbar{display:flex;}
.edit-toolbar-label{font-size:11px;color:#d97706;font-weight:700;}
.etbtn{background:#e2e8f0;border:none;color:#1e293b;border-radius:5px;padding:5px 12px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:500;}
body:not(.light-mode) .etbtn{background:#334155;color:#e2e8f0;}
.etbtn:hover{opacity:.85;}

/* Save/Export edit banner */
.save-banner{display:none;background:#0a2a1a;border:1px solid #16a34a;border-radius:8px;padding:10px 14px;margin-bottom:12px;gap:8px;flex-wrap:wrap;align-items:center;font-size:11px;color:#86efac;}
body.light-mode .save-banner{background:#f0fdf4;color:#166534;}
.edit-mode .save-banner{display:flex;}
.save-btn{background:#16a34a;border:none;color:#fff;border-radius:5px;padding:5px 14px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:600;}
.save-btn:hover{background:#15803d;}
.import-btn{background:#334155;border:none;color:#e2e8f0;border-radius:5px;padding:5px 14px;font-size:11px;cursor:pointer;font-family:inherit;}
body.light-mode .import-btn{background:#e2e8f0;color:#1e293b;}

/* Table */
.tbl-wrap{overflow-x:auto;}
.sheet-table{width:100%;border-collapse:collapse;font-size:12px;}
.sheet-table th,.sheet-table td{padding:6px 9px;border:1px solid #1e2d45;text-align:left;vertical-align:middle;line-height:1.5;min-width:50px;}
body.light-mode .sheet-table th,body.light-mode .sheet-table td{border-color:#e2e8f0;}
.sheet-table th{background:#0d1b2e;color:#e2e8f0;font-size:11px;text-transform:uppercase;letter-spacing:.04em;font-weight:700;position:relative;white-space:nowrap;}
body.light-mode .sheet-table th{background:#f1f5f9;color:#1e293b;}
.sheet-table td{color:#cbd5e1;background:#080f1a;}
body.light-mode .sheet-table td{color:#1e293b;background:#ffffff;}
.sheet-table tr:hover td{background:#0a1422;}
body.light-mode .sheet-table tr:hover td{background:#f8fafc;}
body.light-mode.edit-mode .sheet-table td{background:#ffffff;color:#1e293b;}
body.light-mode.edit-mode .sheet-table tr:hover td{background:#f8fafc;}
.task-num{color:#64748b;font-size:10px;font-weight:700;text-align:center;width:32px;}

/* Edit cells */
.edit-mode .sheet-table td[contenteditable="true"]{cursor:text;outline:none;color:#e2e8f0;background:#0d1f35;}
body.light-mode.edit-mode .sheet-table td[contenteditable="true"]{color:#1e293b;background:#fefce8;border-color:#d97706;}
.edit-mode .sheet-table td[contenteditable="true"]:focus{background:#0c2a4a !important;outline:2px solid #0ea5e9;outline-offset:-2px;color:#e2e8f0;}
body.light-mode.edit-mode .sheet-table td[contenteditable="true"]:focus{background:#fef9c3 !important;outline:2px solid #d97706;outline-offset:-2px;color:#1e293b;}
.edit-mode .sheet-table th[contenteditable="true"]{cursor:text;}
body.light-mode.edit-mode .sheet-table th[contenteditable="true"]{background:#f0fdf4;color:#166534;}
.edit-mode .sheet-table th[contenteditable="true"]:focus{outline:2px solid #10b981;outline-offset:-2px;}
body.light-mode.edit-mode .sheet-table th[contenteditable="true"]:focus{background:#dcfce7 !important;outline:2px solid #16a34a;outline-offset:-2px;}
/* Light mode table rows in edit mode - keep readable */
body.light-mode.edit-mode .sheet-table tr:hover td{background:#fef9c3;}
body.light-mode.edit-mode .sheet-table td{color:#1e293b;}
.col-del-btn{display:none;position:absolute;top:2px;right:2px;background:#ef4444;border:none;color:#fff;font-size:8px;cursor:pointer;border-radius:3px;padding:1px 4px;z-index:5;white-space:nowrap;}
.edit-mode .col-del-btn{display:block;}
.user-editable-table .col-del-btn{display:block;}
.row-del-btn{display:none;background:#ef4444;border:none;color:#fff;font-size:9px;cursor:pointer;border-radius:3px;padding:2px 5px;}
.edit-mode .row-del-btn{display:inline-block;}
.add-row-btn{display:none;}
.edit-mode .add-row-btn{display:block;width:100%;background:transparent;border:1px dashed #334155;color:#64748b;border-radius:5px;padding:6px;font-size:11px;cursor:pointer;margin-top:6px;font-family:inherit;}
.add-row-btn:hover{background:#1e2d45;color:#e2e8f0;}
body.light-mode .add-row-btn:hover{background:#f1f5f9;color:#1e293b;}
.tab-rename-input{background:transparent;border:none;border-bottom:1px dashed #d97706;color:inherit;font-size:16px;font-weight:700;width:100%;outline:none;font-family:inherit;}

/* Assigned To */
.assigned-select{background:#0d1b2e;border:1px solid #1e2d45;color:#e2e8f0;border-radius:5px;font-size:11px;font-family:inherit;padding:3px 6px;width:100%;}
body.light-mode .assigned-select{background:#fff;border-color:#c8d8ea;color:#1e293b;}
.assigned-tags{display:flex;flex-wrap:wrap;gap:3px;}
.role-tag{background:#1e3a5f;color:#38bdf8;font-size:9px;padding:2px 6px;border-radius:10px;white-space:nowrap;}
body.light-mode .role-tag{background:#dbeafe;color:#1d4ed8;}

/* Filter row */
.filter-input{width:100%;background:#0a1628;border:1px solid #1e2d45;border-radius:4px;color:#94a3b8;font-size:10px;padding:3px 5px;font-family:inherit;outline:none;}
body.light-mode .filter-input{background:#fff;border-color:#e2e8f0;color:#334155;}
.filter-input:focus{border-color:#0ea5e9;}

/* Complete btn */
.complete-btn{background:#1e3a5f;border:1px solid #0ea5e9;color:#38bdf8;border-radius:6px;padding:7px 18px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;margin-top:12px;}
.complete-btn:hover{background:#0ea5e9;color:#fff;}
.complete-btn.done{background:#15803d;border-color:#16a34a;color:#fff;cursor:pointer;}

/* History */
.history-title{font-size:15px;font-weight:700;margin-bottom:14px;color:#d97706;}
.history-actions{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.hist-btn{background:#334155;border:none;color:#e2e8f0;border-radius:5px;padding:6px 14px;font-size:11px;cursor:pointer;font-family:inherit;}
body.light-mode .hist-btn{background:#e2e8f0;color:#1e293b;}
.hist-btn.danger{background:#7f1d1d;color:#fca5a5;}
.hist-table{width:100%;border-collapse:collapse;font-size:11px;}
.hist-table th{background:#0d1b2e;color:#64748b;font-size:10px;text-transform:uppercase;padding:7px 10px;border:1px solid #1e2d45;text-align:left;}
body.light-mode .hist-table th{background:#f8fafc;border-color:#e2e8f0;}
.hist-table td{padding:7px 10px;border:1px solid #1e2d45;color:#cbd5e1;vertical-align:top;}
body.light-mode .hist-table td{border-color:#e2e8f0;color:#334155;}

/* ── Handover-matching styles ── */
.col-bar{display:flex;flex-wrap:wrap;gap:4px;align-items:center;margin-bottom:7px;}
.col-chip{display:inline-flex;gap:2px;align-items:center;background:#1a2236;border-radius:4px;padding:1px 4px;}
.col-chip span{font-size:9px;color:#8da3c4;font-family:monospace;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
body.light-mode .col-chip{background:#dde8f5;}
body.light-mode .col-chip span{color:#4a5a7a;}
.td-ctrl{width:56px;text-align:center;vertical-align:middle;background:#0d1527;}
body.light-mode .td-ctrl{background:#eaf2fb;}
.wf-btn{border:none;border-radius:6px;padding:1px 8px;font-weight:700;cursor:pointer;font-size:11px;}
.wf-btn-plus{background:linear-gradient(135deg,#00d4ff,#0088ff);color:#00131e;}
.wf-btn-minus{background:linear-gradient(135deg,#e53e3e,#c53030);color:#fff;}
.wf-btn-secondary{background:#1a2236;border:1px solid #1e2d45;color:#e2e8f0;font-size:11px;border-radius:6px;padding:4px 10px;cursor:pointer;}
body.light-mode .wf-btn-secondary{background:#f1f5f9;border-color:#e2e8f0;color:#334155;}
.wf-add-row-btn{background:#1a2236;border:1px solid #1e2d45;color:#e2e8f0;border-radius:6px;padding:6px 14px;font-size:11px;font-weight:600;cursor:pointer;margin-top:6px;font-family:inherit;}
body.light-mode .wf-add-row-btn{background:#f1f5f9;border-color:#e2e8f0;color:#334155;}
.wf-add-row-btn:hover{background:#334155;}

/* Resizable cells */
.sheet-table th{resize:horizontal;overflow:auto;}
.sheet-table td{resize:vertical;overflow:auto;}
body:not(.edit-mode) .sheet-table th{resize:none;}
body:not(.edit-mode) .sheet-table td{resize:none;}

/* Editable first-col lock */
.no-edit-first td:first-child[contenteditable="true"],
.no-edit-first th:first-child[contenteditable="true"]{
  background:#1a0a0a !important;color:#64748b !important;cursor:not-allowed !important;pointer-events:none;}
body.light-mode .no-edit-first td:first-child[contenteditable="true"],
body.light-mode .no-edit-first th:first-child[contenteditable="true"]{
  background:#fef2f2 !important;color:#94a3b8 !important;}

/* Email config panel */
.email-config-panel{display:none;background:#0a1f35;border:1px solid #0ea5e9;border-radius:10px;padding:16px;margin:12px 0;}
body.light-mode .email-config-panel{background:#eff6ff;border-color:#3b82f6;}
.edit-mode .email-config-panel{display:block;}
.email-config-panel h4{font-size:12px;font-weight:700;color:#38bdf8;margin-bottom:12px;letter-spacing:.04em;}
body.light-mode .email-config-panel h4{color:#1d4ed8;}
.email-config-label{font-size:10px;color:#64748b;display:block;margin-bottom:3px;margin-top:8px;text-transform:uppercase;letter-spacing:.05em;}
.email-config-input{width:100%;background:#0d1b2e;border:1px solid #1e2d45;border-radius:6px;padding:7px 10px;color:#e2e8f0;font-size:12px;font-family:inherit;outline:none;margin-bottom:4px;}
body.light-mode .email-config-input{background:#fff;border-color:#c8d8ea;color:#1e293b;}
.email-config-input:focus{border-color:#0ea5e9;}
.email-config-textarea{width:100%;background:#0d1b2e;border:1px solid #1e2d45;border-radius:6px;padding:7px 10px;color:#e2e8f0;font-size:12px;font-family:inherit;outline:none;resize:vertical;min-height:80px;}
body.light-mode .email-config-textarea{background:#fff;border-color:#c8d8ea;color:#1e293b;}

/* Send email button */
.send-email-btn{background:linear-gradient(135deg,#1d4ed8,#2563eb);border:none;color:#fff;border-radius:7px;padding:9px 22px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
.send-email-btn:hover{background:linear-gradient(135deg,#2563eb,#3b82f6);}
.email-client-sel{background:#0d1b2e;border:1px solid #1e2d45;color:#e2e8f0;border-radius:6px;padding:6px 8px;font-size:11.5px;font-family:inherit;cursor:pointer;outline:none;}
body.light-mode .email-client-sel{background:#fff;border-color:#c8d8ea;color:#1e293b;}
.email-client-sel:hover{border-color:#0ea5e9;}
.send-email-btn-row{margin:14px 0 6px;display:flex;align-items:center;gap:10px;}

/* Inline Click-to-send */
.click-send-btn{background:#1d4ed8;border:1px solid #3b82f6;color:#fff;border-radius:5px;padding:3px 10px;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap;}
.click-send-btn:hover{background:#2563eb;}
.click-send-config{display:none;background:#0a1f35;border:1px solid #0ea5e9;border-radius:8px;padding:12px;margin-top:6px;}
body.light-mode .click-send-config{background:#eff6ff;}
.edit-mode .click-send-config.open{display:block;}

/* Event procedure section divider */
.ep-section-divider{border:none;border-top:2px solid #334155;margin:12px 0;}
body.light-mode .ep-section-divider{border-color:#e2e8f0;}

.email-inline-config td{background:#071525 !important;}

/* ── Email send button row (button + status + setup gear) ── */
.desk-select{background:#0a1628;border:1px solid #1e2d45;border-radius:7px;color:#e2e8f0;font-size:12px;font-family:inherit;padding:7px 10px;min-width:190px;outline:none;cursor:pointer;}
.desk-select:focus{border-color:#0ea5e9;}
body.light-mode .desk-select{background:#f5f9fd;border-color:#c8d8ea;color:#1e293b;}
.click-send-wrap{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.email-status{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:50%;font-size:10px;font-weight:800;flex-shrink:0;cursor:default;}
.email-status.ok{background:rgba(22,163,74,.18);color:#22c55e;border:1px solid #16a34a;}
.email-status.warn{background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid #d97706;}
.email-setup-btn{display:none;align-items:center;gap:4px;background:#1e2d45;border:1px solid #334155;color:#94a3b8;border-radius:6px;padding:4px 10px;font-size:10.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap;}
.email-setup-btn:hover{color:#e2e8f0;border-color:#0ea5e9;}
.edit-mode .email-setup-btn{display:inline-flex;}
body.light-mode .email-setup-btn{background:#eef4fb;border-color:#c8d8ea;color:#475569;}
body.light-mode .email-setup-btn:hover{color:#1e293b;border-color:#3b82f6;}

/* ── Email setup modal ── */
.em-overlay{display:none;position:fixed;inset:0;background:rgba(2,8,20,.72);backdrop-filter:blur(3px);z-index:1000;align-items:center;justify-content:center;padding:20px;}
.em-overlay.open{display:flex;}
.em-modal{background:#0d1b2e;border:1px solid #1e2d45;border-radius:14px;width:100%;max-width:580px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.55);}
body.light-mode .em-modal{background:#fff;border-color:#c8d8ea;}
.em-head{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid #1e2d45;}
body.light-mode .em-head{border-color:#dbe7f3;}
.em-head-titles{flex:1;min-width:0;}
.em-head h3{font-size:13px;font-weight:700;color:#38bdf8;letter-spacing:.04em;margin:0;}
body.light-mode .em-head h3{color:#1d4ed8;}
.em-sub{font-size:11px;color:#94a3b8;font-weight:600;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.em-close{background:none;border:none;color:#64748b;font-size:16px;cursor:pointer;padding:4px 9px;border-radius:6px;font-family:inherit;}
.em-close:hover{background:#1e2d45;color:#e2e8f0;}
body.light-mode .em-close:hover{background:#eef4fb;color:#1e293b;}
.em-body{padding:16px 18px;overflow-y:auto;}
.em-label{display:block;font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin:12px 0 4px;}
.em-body .em-label:first-child{margin-top:0;}
.em-hint{font-size:10px;color:#475569;margin-top:3px;}
.em-input,.em-textarea{width:100%;background:#0a1628;border:1px solid #1e2d45;border-radius:8px;padding:9px 12px;color:#e2e8f0;font-size:12.5px;font-family:inherit;outline:none;box-sizing:border-box;}
.em-input:focus,.em-textarea:focus{border-color:#0ea5e9;box-shadow:0 0 0 2px rgba(14,165,233,.15);}
body.light-mode .em-input,body.light-mode .em-textarea{background:#f5f9fd;border-color:#c8d8ea;color:#1e293b;}
.em-textarea{resize:vertical;min-height:120px;line-height:1.5;}
.em-foot{display:flex;align-items:center;gap:10px;padding:14px 18px;border-top:1px solid #1e2d45;}
body.light-mode .em-foot{border-color:#dbe7f3;}
.em-foot-spacer{flex:1;}
.em-btn{border:none;border-radius:8px;padding:9px 18px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;}
.em-btn-test{background:#1e2d45;color:#94a3b8;border:1px solid #334155;}
.em-btn-test:hover{color:#e2e8f0;border-color:#0ea5e9;}
body.light-mode .em-btn-test{background:#eef4fb;border-color:#c8d8ea;color:#475569;}
.em-btn-cancel{background:transparent;color:#64748b;border:1px solid #1e2d45;}
.em-btn-cancel:hover{color:#e2e8f0;}
body.light-mode .em-btn-cancel{border-color:#c8d8ea;}
body.light-mode .em-btn-cancel:hover{color:#1e293b;}
.em-btn-save{background:linear-gradient(135deg,#1d4ed8,#2563eb);color:#fff;}
.em-btn-save:hover{background:linear-gradient(135deg,#2563eb,#3b82f6);}
.no-data,.no-history{padding:40px;text-align:center;color:#475569;font-size:12px;font-style:italic;}

/* Popup */
#completePopup{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;align-items:center;justify-content:center;}
#completePopup.open{display:flex;}
.popup-modal{background:#0d1b2e;border:1px solid #1e2d45;border-radius:12px;padding:24px;width:360px;max-width:92vw;}
body.light-mode .popup-modal{background:#fff;border-color:#e2e8f0;}
.popup-label{font-size:11px;color:#64748b;display:block;margin-bottom:4px;}
.popup-input{width:100%;background:#1e2d45;border:1px solid #334155;border-radius:6px;padding:8px 12px;color:#e2e8f0;font-size:12px;font-family:inherit;outline:none;margin-bottom:12px;}
body.light-mode .popup-input{background:#f8fafc;border-color:#e2e8f0;color:#1e293b;}
</style>
</head>
<body>

<header>
  <div style="flex:1;">
    <div class="hdr-title">✈ Day of Ops Workflow</div>
    <span class="hdr-sub">Crew Services Reference</span>
  </div>
  <button class="hdr-btn back-main" onclick="goBackToMain()">← Handover</button>
  <button class="hdr-btn" onclick="goBack()">↩ Back</button>
  <button class="hdr-btn back-main" onclick="hideAll()">🏠 Main Menu</button>
  <div class="theme-toggle-wrap">
    <span class="theme-icon">🌙</span>
    <label class="theme-toggle" title="Toggle light / dark mode">
      <input type="checkbox" id="themeToggle" onchange="applyTheme(this.checked)" />
      <span class="theme-toggle-slider"></span>
    </label>
    <span class="theme-icon">☀️</span>
  </div>
  <button class="hdr-btn" id="exportEditsBtn" onclick="exportEdits()" style="display:none;" title="Export your edits to share with team">⬇ Export Edits</button>
  <button class="hdr-btn" id="importEditsBtn" onclick="document.getElementById('importFile').click()" style="display:none;" title="Import edits from file">⬆ Import Edits</button>
  <button class="hdr-btn" id="undoHdrBtn" onclick="doUndo()" style="display:none;opacity:0.4;" disabled title="Undo (Ctrl+Z)">↩ Undo</button>
  <button class="hdr-btn" id="redoHdrBtn" onclick="doRedo()" style="display:none;opacity:0.4;" disabled title="Redo (Ctrl+Y)">↪ Redo</button>
  <button class="hdr-btn" id="editBtn" onclick="toggleEdit()">✏️ Edit</button>
</header>


<div class="layout">
  <div class="sidebar">
    <div class="sidebar-main" id="sidebar"></div>
    <button class="history-tab-btn" id="historyTabBtn" onclick="showHistory()">📋 History Log</button>
  </div>
  <div class="main" id="mainArea">
    <div id="welcomeView">
      <div class="welcome">
        <h3>Day of Ops Workflow Reference</h3>
        <p>Select a sheet from the sidebar or browse by category</p>
      </div>
      <div class="cat-cards" id="catCards"></div>
    </div>
    <div id="sheetView" style="display:none;"></div>
    <div id="historyView" style="display:none;"></div>
  </div>
</div>

<div id="completePopup">
  <div class="popup-modal">
    <div style="font-size:14px;font-weight:700;margin-bottom:16px;">✅ Mark as Completed</div>
    <label class="popup-label">Your Name</label>
    <input type="text" id="completeName" class="popup-input" placeholder="Enter your full name...">
    <label class="popup-label">Your Role</label>
    <select id="completeRole" class="popup-input" style="margin-bottom:20px;">
      <option value="">-- Select Role --</option>
    </select>
    <div style="display:flex;gap:8px;">
      <button onclick="submitComplete()" style="flex:1;background:#15803d;border:none;color:#fff;border-radius:6px;padding:9px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;">Confirm</button>
      <button onclick="cancelComplete()" style="background:#334155;border:none;color:#94a3b8;border-radius:6px;padding:9px 16px;font-size:12px;cursor:pointer;font-family:inherit;">Cancel</button>
    </div>
  </div>
</div>

<input type="file" id="importFile" accept=".json" style="display:none" onchange="importEdits(event)">

var editMode = false, isLight = false, currentSheet = null, currentCat = null, pendingCompleteSheet = null;
var undoStack = [], redoStack = [];
var MAX_UNDO = 30;

function pushUndo(){
  undoStack.push(JSON.stringify(DATA));
  if(undoStack.length > MAX_UNDO) undoStack.shift();
  redoStack = [];
  updateUndoRedoBtns();
}

function doUndo(){
  if(!undoStack.length) return;
  redoStack.push(JSON.stringify(DATA));
  DATA = JSON.parse(undoStack.pop());
  saveAll(); buildSidebar(); buildCatCards();
  if(currentSheet) showSheet(currentSheet, currentCat);
  updateUndoRedoBtns();
}

function doRedo(){
  if(!redoStack.length) return;
  undoStack.push(JSON.stringify(DATA));
  DATA = JSON.parse(redoStack.pop());
  saveAll(); buildSidebar(); buildCatCards();
  if(currentSheet) showSheet(currentSheet, currentCat);
  updateUndoRedoBtns();
}

function updateUndoRedoBtns(){
  var canUndo=undoStack.length>0; var canRedo=redoStack.length>0;
  ['undoWfBtn','undoHdrBtn'].forEach(function(id){ var el=document.getElementById(id); if(el){ el.disabled=!canUndo; el.style.opacity=canUndo?'1':'0.4'; } });
  ['redoWfBtn','redoHdrBtn'].forEach(function(id){ var el=document.getElementById(id); if(el){ el.disabled=!canRedo; el.style.opacity=canRedo?'1':'0.4'; } });
}

function buildSidebar(){

    var accent=CAT_COLORS[cat]||'#64748b';

  }
}

// ── Main tab (category) management — edit mode only ──
function renameCategory(oldName){
  var n=prompt('Rename main tab "'+oldName+'" to:', oldName);
  if(!n||!n.trim()||n.trim()===oldName) return;
  n=n.trim();
  if(DATA[n]){ alert('A main tab named "'+n+'" already exists.'); return; }
  pushUndo();
  var nd={};
  Object.keys(DATA).forEach(function(k){ nd[k===oldName?n:k]=DATA[k]; });
  DATA=nd;
  if(CAT_COLORS[oldName]){ CAT_COLORS[n]=CAT_COLORS[oldName]; saveCatColors(); }
  if(currentCat===oldName) currentCat=n;
  saveAll(); buildSidebar(); buildCatCards();
  if(currentSheet) showSheet(currentSheet,currentCat);
}
function createCategory(){
  var n=prompt('New main tab name:');
  if(!n||!n.trim()) return;
  n=n.trim();
  if(DATA[n]){ alert('A main tab named "'+n+'" already exists.'); return; }
  pushUndo();
  DATA[n]=[];
  if(!CAT_COLORS[n]){ CAT_COLORS[n]=CAT_PALETTE[Object.keys(DATA).length % CAT_PALETTE.length]; saveCatColors(); }
  saveAll(); buildSidebar(); buildCatCards();
}

// ── Render table ──
var _filters={};
function renderTable(sd,cat,container,accent,isTarget,isUserEditable){
  ['tbl-wrap','add-row-btn','no-data','wf-add-row-btn','col-bar'].forEach(function(cls){ var el=container.querySelector('.'+cls); if(el) el.remove(); });
  sd._emailCount = 0; // Reset email button counter
  if(!sd.rows||!sd.rows.length){ var nd=document.createElement('div'); nd.className='no-data'; nd.textContent='No data.'; container.appendChild(nd); return; }
  var sheetKey=sd.name;
  if(!assignedRoles[sheetKey]) assignedRoles[sheetKey]={};
  if(!_filters[sheetKey]) _filters[sheetKey]={};
  var filters=_filters[sheetKey];
  var maxCols=Math.max.apply(null,sd.rows.map(function(r){return r.length;}));
  var canEdit = editMode;

  // ── COL-BAR (handover style) ──
  if(canEdit){
    var bar=document.createElement('div'); bar.className='col-bar';

    bar.appendChild(lbl);
    for(var ci=0;ci<maxCols;ci++){
      var chip=document.createElement('span'); chip.className='col-chip';
      var nm=document.createElement('span'); nm.textContent=sd.rows[0]?sd.rows[0][ci]||('Col '+(ci+1)):'Col '+(ci+1); chip.appendChild(nm);
      var plus=document.createElement('button'); plus.className='wf-btn wf-btn-plus'; plus.style.padding='0 5px'; plus.textContent='+';
      (function(colIdx){ plus.onclick=function(){ pushUndo(); var n=prompt('Column name:','New Column'); if(!n) return; sd.rows.forEach(function(r,ri){ r.splice(colIdx+1,0,ri===0?n:''); }); saveAll(); renderTable(sd,cat,container,accent,isTarget,isUserEditable); }; })(ci);
      var minus=document.createElement('button'); minus.className='wf-btn wf-btn-minus'; minus.style.padding='0 5px'; minus.textContent='−';
      (function(colIdx){ minus.onclick=function(){ if(maxCols<=1) return; if(!confirm('Delete column "'+sd.rows[0][colIdx]+'"?')) return; pushUndo(); sd.rows.forEach(function(r){if(colIdx<r.length)r.splice(colIdx,1);}); saveAll(); renderTable(sd,cat,container,accent,isTarget,isUserEditable); }; })(ci);
      chip.appendChild(plus); chip.appendChild(minus); bar.appendChild(chip);
    }
    var addCol=document.createElement('button'); addCol.className='wf-btn-secondary'; addCol.textContent='+ Col';
    addCol.onclick=function(){ pushUndo(); var n=prompt('Column name:','New Column'); if(!n) return; sd.rows.forEach(function(r,ri){ r.push(ri===0?n:''); }); saveAll(); renderTable(sd,cat,container,accent,isTarget,isUserEditable); };
    bar.appendChild(addCol);
    container.appendChild(bar);
  }

  var wrap=document.createElement('div'); wrap.className='tbl-wrap';
  var tbl=document.createElement('table'); tbl.className='sheet-table';
  if(isUserEditable && !sd.emailBtn) tbl.classList.add('no-edit-first');

  var hRow=document.createElement('tr');
  if(canEdit){ var phTh=document.createElement('th'); phTh.className='td-ctrl'; phTh.style.background=''; hRow.appendChild(phTh); }
  for(var ci=0;ci<maxCols;ci++){
    var th=document.createElement('th');
    th.textContent=sd.rows[0]?sd.rows[0][ci]||'':'';
    if(canEdit && (editMode || !isUserEditable || ci>0)){
      th.contentEditable='true';
      (function(col){ th.oninput=function(){ while(sd.rows[0].length<=col) sd.rows[0].push(''); sd.rows[0][col]=this.textContent; saveAll(); }; })(ci);
    }
    hRow.appendChild(th);
  }
  if(isTarget){
    var ath=document.createElement('th'); ath.style.cssText='min-width:130px;color:#f59e0b;'; ath.textContent='Assigned To'; hRow.appendChild(ath);
  }
  tbl.appendChild(hRow);

  // ── Filter row (not on DHD-style form sheets or event procedure sheets) ──
  var showFilters = !(sd.emailBtn || EVENT_SHEETS.indexOf(sd.name)>=0);
  if(showFilters){
  var fRow=document.createElement('tr');
  if(canEdit){ var fp=document.createElement('td'); fp.className='td-ctrl'; fp.style.padding='2px'; fRow.appendChild(fp); }
  for(var ci2=0;ci2<maxCols;ci2++){
    var ftd=document.createElement('td'); ftd.style.padding='3px 5px';
    var fi=document.createElement('input'); fi.className='filter-input'; fi.placeholder='Filter...'; fi.value=filters[ci2]||'';
    (function(col,el){ el.oninput=function(){ filters[col]=this.value.toLowerCase(); applyFilters(tbl,sd.rows,maxCols,filters,sheetKey,isTarget); }; })(ci2,fi);
    ftd.appendChild(fi); fRow.appendChild(ftd);
  }

function applyFilters(tbl,rows,maxCols,filters,sheetKey,isTarget){

  for(var i=2;i<trs.length;i++){
    var ri=i-1; var tr=trs[i]; var show=true;
    var tds=tr.querySelectorAll('td');
    for(var ci=0;ci<maxCols;ci++){
      var fv=filters[ci]||''; if(!fv) continue;
      var idx=editMode?ci+1:ci;
      if(!(tds[idx]&&tds[idx].textContent.toLowerCase().includes(fv))){ show=false; break; }
    }
    if(show&&isTarget&&filters['assigned']){
      var rk='row_'+ri;
      var ar2=(assignedRoles[sheetKey]&&assignedRoles[sheetKey][rk])||[];
      if(!ar2.join(' ').toLowerCase().includes(filters['assigned'])) show=false;
    }
    tr.style.display=show?'':'none';
  }
}

function updateMainHandover(name,role){
  var updated = false;
  // Try parent frame first (iframe mode)
  try{
    if(window.parent && window.parent!==window){
      if(typeof window.parent.updateDutyRoster==='function'){
        updated = window.parent.updateDutyRoster(role,name);
      }
    }
  }catch(e){}
  // Try opener (new window mode)
  if(!updated){
    try{
      if(window.opener && !window.opener.closed){
        if(typeof window.opener.updateDutyRoster==='function'){
          updated = window.opener.updateDutyRoster(role,name);
        }
      }
    }catch(e){}
  }
  // Also post message as fallback
  try{ window.parent.postMessage({type:'updateDutyRoster',role:role,name:name},'*'); }catch(e){}
  try{ if(window.opener) window.opener.postMessage({type:'updateDutyRoster',role:role,name:name},'*'); }catch(e){}
  if(updated){ showUpdateSuccess(); } else { showUpdateInfo(); }
}

var emailConfigs = JSON.parse(localStorage.getItem('workflow_email_configs') || '{}');
function saveEmailConfigs(){ try{localStorage.setItem('workflow_email_configs',JSON.stringify(emailConfigs));}catch(e){} }

function getEmailConfig(key){
  return emailConfigs[key] || {to:'',cc:'',subject:'',body:'',client:'desktop'};
}
function setEmailConfig(key, cfg){
  emailConfigs[key] = cfg; saveEmailConfigs();
}

// Stable key based on the sheet + task label (survives row add/delete)
function emailKeyFor(sheetName, label){
  return 'event_'+sheetName+'__'+String(label||'').toUpperCase().replace(/\s+/g,' ').trim();
}

// Get config; if empty, migrate from older row/column-position-based keys
function getEmailConfig2(key, legacyKeys){
  var cfg = emailConfigs[key];
  if(cfg && (cfg.to||cfg.subject||cfg.body)) return cfg;
  for(var i=0;i<(legacyKeys||[]).length;i++){
    var lc = emailConfigs[legacyKeys[i]];
    if(lc && (lc.to||lc.subject||lc.body)){ emailConfigs[key]=lc; saveEmailConfigs(); return lc; }
  }
  return cfg || {to:'',cc:'',subject:'',body:'',client:'desktop'};
}

// Build an inline Outlook Desktop/Web selector for a given email config key.
// Mirrors the dropdown style used in FINAL_01062026.html, but persists the
// choice per-button (per config key) rather than as one global setting.
function makeEmailClientSel(configKey){
  var cfg = getEmailConfig(configKey);
  var sel = document.createElement('select');
  sel.className = 'email-client-sel';
  sel.title = 'Choose which email client this button opens';
  sel.innerHTML =
    '<option value="desktop"'+(cfg.client!=='web'?' selected':'')+'>\ud83d\udce7 Desktop Outlook</option>'+

  };

// Move a saved email config when its task label is renamed (label is part of the key)
function migrateEmailKey(oldKey, newKey){
  if(oldKey===newKey) return;
  var oc = emailConfigs[oldKey];
  var nc = emailConfigs[newKey];
  if(oc && (oc.to||oc.subject||oc.body) && !(nc && nc.to)){
    emailConfigs[newKey] = oc; saveEmailConfigs();
  }
}

// Build a mailto: link (date auto-appended to subject)
function buildMailto(cfg, fallbackSubject, extraBody){
  var now = new Date();
  var dateStr = now.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
  var subject = (cfg.subject||fallbackSubject||'Email') + ' — ' + dateStr;
  var body = (cfg.body||'') + (extraBody||'');
  var params = [];
  if(cfg.cc && cfg.cc.trim()) params.push('cc='+encodeURIComponent(cfg.cc.trim()));
  params.push('subject='+encodeURIComponent(subject));
  params.push('body='+encodeURIComponent(body));
  return 'mailto:'+encodeURIComponent((cfg.to||'').trim())+'?'+params.join('&');
}

// Build an Outlook-on-the-web (Microsoft 365) compose deep-link
function buildOutlookWeb(cfg, fallbackSubject, extraBody){
  var now = new Date();
  var dateStr = now.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
  var subject = (cfg.subject||fallbackSubject||'Email') + ' — ' + dateStr;
  var body = (cfg.body||'') + (extraBody||'');
  var params = ['to='+encodeURIComponent((cfg.to||'').trim())];
  if(cfg.cc && cfg.cc.trim()) params.push('cc='+encodeURIComponent(cfg.cc.trim()));
  params.push('subject='+encodeURIComponent(subject));
  params.push('body='+encodeURIComponent(body));
  return 'https://outlook.office.com/mail/deeplink/compose?'+params.join('&');
}

// Open the email using the client chosen for this config ('desktop'=mailto, 'web'=M365 web)
function openEmail(cfg, fallbackSubject, extraBody){
  if(cfg && cfg.client==='web'){
    window.open(buildOutlookWeb(cfg, fallbackSubject, extraBody), '_blank');
  } else {
    window.open(buildMailto(cfg, fallbackSubject, extraBody), '_blank');
  }
}

// Build the allocation sheet as a real HTML table (Outlook-friendly inline styles)
function buildAllocTableHtml(rows){
  var esc = function(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); };
  var dataRows = (rows||[]).filter(function(r){
    return r && r.some(function(c){ return c && String(c).trim() && !isEmailCellVal(String(c)); });
  });
  var maxCols = Math.max.apply(null, dataRows.map(function(r){ return r.length; }).concat([2]));
  var html = '<table border="1" cellpadding="0" cellspacing="0" style="border-collapse:collapse;font-family:Calibri,Arial,sans-serif;font-size:11pt;border:1px solid #44546a;background:#ffffff;">';
  html += '<tr><td colspan="'+maxCols+'" style="background:#1f3864;color:#ffffff;font-weight:bold;padding:8px 12px;border:1px solid #44546a;text-align:center;">CREW CONTROL DISRUPTION ALLOCATION SHEET</td></tr>';
  dataRows.forEach(function(r){
    html += '<tr>';
    for(var i=0;i<maxCols;i++){
      var v = (r[i]!==undefined && r[i]!==null) ? String(r[i]) : '';
      if(isEmailCellVal(v)) v = '';
      var st = (i===0)
        ? 'padding:6px 12px;border:1px solid #8496b0;background:#f2f5fa;font-weight:bold;color:#1f3864;'
        : 'padding:6px 12px;border:1px solid #8496b0;background:#ffffff;color:#000000;min-width:170px;';
      html += '<td style="'+st+'">'+(esc(v)||'&nbsp;')+'</td>';
    }
    html += '</tr>';
  });
  html += '</table>';
  return html;
}


// Copy HTML to the clipboard (rich format, so pasting into Outlook gives a real table)
function copyHtmlToClipboard(html){
  var div = document.createElement('div');
  div.contentEditable = 'true';
  div.style.cssText = 'position:fixed;left:-9999px;top:0;opacity:0;';
  div.innerHTML = html;
  document.body.appendChild(div);
  var ok = false;
  try{
    var range = document.createRange(); range.selectNodeContents(div);
    var sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
    ok = document.execCommand('copy');
    sel.removeAllRanges();
  }catch(e){ ok = false; }
  div.remove();
  return ok;
}

// ── Migrate per-sheet settings when a sheet (sub tab) is renamed ──

  ['checklist_','allocation_','sheetemail_'].forEach(function(p){

  });

    var p='event_'+oldN+'__';
    if(k.indexOf(p)===0){ var nk='event_'+newN+'__'+k.slice(p.length); if(!emailConfigs[nk]) emailConfigs[nk]=emailConfigs[k]; }
  });
  saveEmailConfigs();
  var ci=CHECKLIST_SHEETS.indexOf(oldN); if(ci>=0) CHECKLIST_SHEETS[ci]=newN;

  if(assignedRoles[oldN]){ assignedRoles[newN]=assignedRoles[oldN]; delete assignedRoles[oldN]; try{localStorage.setItem('workflow_assigned',JSON.stringify(assignedRoles));}catch(e){} }
}

  });
  cv.appendChild(grid);
}

// ─── Override showSheet for Checklists and Event Procedures ───
var _origShowSheet = showSheet;
showSheet = function(name, cat){
  _origShowSheet(name, cat);
  var sv = document.getElementById('sheetView');
  var sd = null;
  Object.keys(DATA).forEach(function(c){ DATA[c].forEach(function(s){ if(s.name===name) sd=s; }); });
  if(!sd) return;
  // Checklists: send-email button
  if(CHECKLIST_SHEETS.indexOf(name)>=0){ postProcessChecklist(name, sv); }
  // Event sheets: split into two tables when an allocation marker exists
  if(EVENT_SHEETS.indexOf(name)>=0){ postProcessEventSheet(name, sv); }
  // Desk Allocation sheets: drop-down names with auto extensions
  if(sd.type==='desk'){ postProcessDeskSheet(sd, sv); }
  // Sheets flagged with an email button: table copied to clipboard + mailto
  if(sd.emailBtn){ buildTableEmailBtn(sd, sv); }
  // Edit-mode: manage the drop-down option lists when this sheet uses drop-down columns
  if(editMode && sd.emailBtn && sd.type!=='desk' && (sd.rows[0]||[]).some(function(h){ return dropdownKeyFor(h); })){
    var ddb=document.createElement('button'); ddb.className='etbtn'; ddb.style.cssText='margin:10px 0;display:inline-flex;align-items:center;gap:6px;';
    ddb.textContent='\u2699 Edit Drop-down Lists';
    ddb.onclick=openDropdownModal;
    sv.appendChild(ddb);
  }
};

// After renderTable, add checklist features
function postProcessChecklist(name, sv){
  // Get sheet data
  var sd = null;
  Object.keys(DATA).forEach(function(c){ DATA[c].forEach(function(s){ if(s.name===name) sd=s; }); });
  if(!sd) return;

  // Lock first column in edit mode
  var tbl = sv.querySelector('.sheet-table');
  if(tbl) tbl.classList.add('no-edit-first');

  // Add send email button (configure via ⚙ Setup in Edit mode)
  buildSendEmailBtn(name, sd.rows, sv);
}

// Post-process Amber/Red event sheets
function postProcessEventSheet(name, sv){
  var sd = null;
  Object.keys(DATA).forEach(function(cat){ DATA[cat].forEach(function(s){ if(s.name===name) sd=s; }); });
  if(!sd) return;

  // Find split point - DISRUPTION ALLOCATION SHEET
  var splitRow = -1;
  for(var i=0;i<sd.rows.length;i++){
    var rowText = sd.rows[i].join(' ').toUpperCase();
    if(rowText.indexOf('CREW CONTROL DISRUPTION ALLOCATION')>=0 || rowText.indexOf('DISRUPTION ALLOCATION SHEET')>=0){
      splitRow = i; break;
    }
  }

  // No allocation marker (e.g. Green): keep the single table, just lock the first column styling
  if(splitRow<0){
    var tblG = sv.querySelector('.sheet-table');
    if(tblG) tblG.classList.add('no-edit-first');
    return;
  }

  // Remove everything the single-table renderer produced (table, col bar, add-row button)
  var oldTbl = sv.querySelector('.tbl-wrap'); if(oldTbl) oldTbl.remove();
  var oldBar = sv.querySelector('.col-bar'); if(oldBar) oldBar.remove();
  var oldAddRow = sv.querySelector('.add-row-btn'); if(oldAddRow) oldAddRow.remove();
  var oldAddRow2 = sv.querySelector('.wf-add-row-btn'); if(oldAddRow2) oldAddRow2.remove();

  // Build fake sd objects for each section
  var topRows = splitRow>=0 ? sd.rows.slice(0, splitRow) : sd.rows;
  var bottomRows = splitRow>=0 ? sd.rows.slice(splitRow) : [];
  var markerRow = splitRow>=0 ? sd.rows[splitRow] : null;

  var accent = '#ef4444';
  var isTarget = false;
  var isUserEditable = true;

  var topSd = {name: sd.name+'_top', rows: topRows};
  var allocRows = splitRow>=0 ? bottomRows.slice(1) : [];
  var botSd = {name: sd.name+'_bot', rows: allocRows};

  // Write section rows back into the real sheet so row/column adds & deletes persist
  function commitRows(){
    if(markerRow){ sd.rows = topSd.rows.concat([markerRow], botSd.rows); }
    else { sd.rows = topSd.rows; }
    saveAll();
  }

  // ── TOP TABLE ──
  if(topRows.length){
    var topWrap = document.createElement('div'); topWrap.className='tbl-wrap';
    renderTableInline(topSd, topWrap, accent, isUserEditable, false, commitRows);
    sv.appendChild(topWrap);
  }

  // ── DIVIDER ──
  if(splitRow>=0){
    var divLabel = document.createElement('div');
    divLabel.style.cssText='margin:16px 0 8px;padding:10px 14px;background:#1a0a1a;border-left:3px solid #ef4444;border-radius:0 6px 6px 0;font-weight:700;font-size:12px;color:#ef4444;letter-spacing:.06em;text-transform:uppercase;';
    divLabel.textContent='CREW CONTROL DISRUPTION ALLOCATION SHEET';
    sv.appendChild(divLabel);
  }

  // ── BOTTOM TABLE (Allocation sheet) ──
  if(allocRows.length){
    var botWrap = document.createElement('div'); botWrap.className='tbl-wrap'; botWrap.style.marginBottom='12px';
    renderTableInline(botSd, botWrap, '#8b5cf6', isUserEditable, true, commitRows);
    sv.appendChild(botWrap);

    // Email send button — captures the LIVE allocation table (botSd.rows) as the email body
    buildAllocationSendBtn(name, botSd.rows, 0, sv);
  }
}

// Render a table inline without the full showSheet wrapper
// isAlloc tables render headerless (every row is a data row).
// onRowsChanged persists row add/delete back into the real sheet.
function renderTableInline(fakeSd, container, accent, isUserEditable, isAlloc, onRowsChanged){
  if(!fakeSd.rows||!fakeSd.rows.length) return;
  var persist = onRowsChanged || saveAll;
  var rerender = function(){ container.innerHTML=''; renderTableInline(fakeSd,container,accent,isUserEditable,isAlloc,onRowsChanged); };
  var maxCols = Math.max.apply(null, fakeSd.rows.map(function(r){return r.length;}));
  var canEdit = editMode;

  // ── COLUMN BAR (add / remove columns) ──
  if(canEdit){
    var bar=document.createElement('div'); bar.className='col-bar';
    var lbl=document.createElement('span'); lbl.style.cssText='font-size:10px;color:#64748b;font-weight:700;letter-spacing:.06em;margin-right:4px;'; lbl.textContent='COLS:';
    bar.appendChild(lbl);
    for(var cb=0;cb<maxCols;cb++){
      var chip=document.createElement('span'); chip.className='col-chip';
      var nm=document.createElement('span');
      var colName = (!isAlloc && fakeSd.rows[0] && fakeSd.rows[0][cb]) ? String(fakeSd.rows[0][cb]) : ('Col '+(cb+1));
      nm.textContent = colName.length>18 ? colName.slice(0,18)+'\u2026' : colName;
      chip.appendChild(nm);
      var plus=document.createElement('button'); plus.className='wf-btn wf-btn-plus'; plus.style.padding='0 5px'; plus.textContent='+'; plus.title='Insert column after';
      (function(colIdx){ plus.onclick=function(){ pushUndo(); var n=isAlloc?'':prompt('Column name:','New Column'); if(!isAlloc && n===null) return; fakeSd.rows.forEach(function(r,ri){ while(r.length<colIdx+1) r.push(''); r.splice(colIdx+1,0,(!isAlloc&&ri===0)?(n||''):''); }); persist(); rerender(); }; })(cb);
      var minus=document.createElement('button'); minus.className='wf-btn wf-btn-minus'; minus.style.padding='0 5px'; minus.textContent='\u2212'; minus.title='Delete column';
      (function(colIdx){ minus.onclick=function(){ if(maxCols<=1) return; if(!confirm('Delete column "'+((!isAlloc&&fakeSd.rows[0]&&fakeSd.rows[0][colIdx])||('Col '+(colIdx+1)))+'"?')) return; pushUndo(); fakeSd.rows.forEach(function(r){ if(colIdx<r.length) r.splice(colIdx,1); }); persist(); rerender(); }; })(cb);
      chip.appendChild(plus); chip.appendChild(minus); bar.appendChild(chip);
    }
    var addCol=document.createElement('button'); addCol.className='wf-btn-secondary'; addCol.textContent='+ Col'; addCol.title='Add column at the end';
    addCol.onclick=function(){ pushUndo(); var n=isAlloc?'':prompt('Column name:','New Column'); if(!isAlloc && n===null) return; fakeSd.rows.forEach(function(r,ri){ while(r.length<maxCols) r.push(''); r.push((!isAlloc&&ri===0)?(n||''):''); }); persist(); rerender(); };
    bar.appendChild(addCol);
    container.appendChild(bar);
  }

  var tbl = document.createElement('table'); tbl.className='sheet-table';
  tbl.classList.add('no-edit-first');
  if(isUserEditable) tbl.classList.add('user-editable-table');

  // ── Header row (skipped for allocation tables) ──
  if(!isAlloc){
    var hRow = document.createElement('tr');
    if(canEdit){ var phTh=document.createElement('th'); phTh.className='td-ctrl'; hRow.appendChild(phTh); }
    for(var ci=0;ci<maxCols;ci++){
      var th = document.createElement('th'); th.style.position='relative';
      th.textContent = fakeSd.rows[0]?fakeSd.rows[0][ci]||'':'';
      if(canEdit && (editMode || ci>0)){
        th.contentEditable='true';
        (function(col){ th.oninput=function(){ while(fakeSd.rows[0].length<=col) fakeSd.rows[0].push(''); fakeSd.rows[0][col]=this.textContent; saveAll(); }; })(ci);
      }
      hRow.appendChild(th);
    }
    tbl.appendChild(hRow);
  }

  // ── Data rows ──
  var startRi = isAlloc ? 0 : 1;
  for(var ri=startRi;ri<fakeSd.rows.length;ri++){
    var row=fakeSd.rows[ri]; var tr=document.createElement('tr');
    if(canEdit){
      var dtd=document.createElement('td'); dtd.className='td-ctrl';
      var ctrlW=document.createElement('div'); ctrlW.style.cssText='display:flex;flex-direction:column;gap:4px;align-items:center;padding:4px;';
      var rins=document.createElement('button'); rins.className='wf-btn wf-btn-plus'; rins.style.padding='1px 8px'; rins.textContent='+'; rins.title='Insert row below';
      (function(idx){ rins.onclick=function(){ pushUndo(); var n=fakeSd.rows[0]?fakeSd.rows[0].length:2; var nr=[]; for(var i=0;i<n;i++) nr.push(''); fakeSd.rows.splice(idx+1,0,nr); persist(); rerender(); }; })(ri);
      var rdel2=document.createElement('button'); rdel2.className='wf-btn wf-btn-minus'; rdel2.style.cssText='padding:1px 8px;display:block;'; rdel2.textContent='\u2212'; rdel2.title='Delete row';
      (function(idx){ rdel2.onclick=function(){ pushUndo(); fakeSd.rows.splice(idx,1); persist(); rerender(); }; })(ri);
      ctrlW.appendChild(rins); ctrlW.appendChild(rdel2); dtd.appendChild(ctrlW); tr.appendChild(dtd);
    }
    for(var ci2=0;ci2<maxCols;ci2++){
      var td=document.createElement('td');
      var inlineCellVal=(row[ci2]!==undefined&&row[ci2]!==null)?String(row[ci2]):'';
      if(isEmailCellVal(inlineCellVal)){
        // Self-heal if the stored text got corrupted
        if(inlineCellVal.trim()!=='Click to send email'){ fakeSd.rows[ri][ci2]='Click to send email'; saveAll(); }
        td.style.cssText='padding:4px 8px;vertical-align:top;';
        var baseNameI = fakeSd.name.replace('_top','').replace('_bot','');
        var lblI = (row[0]!==undefined&&row[0]!==null&&String(row[0]).trim()) ? String(row[0]).trim() : 'Email';
        if(isAlloc && /allocation/i.test(lblI)){
          // Allocation row shares the same config as the big "Email Allocations" button,
          // and includes the allocation table in the email body
          var allocKey = 'allocation_'+baseNameI;
          buildClickSendBtn(lblI, allocKey, td, [], function(){
            var t='\n\n--- CREW CONTROL DISRUPTION ALLOCATION SHEET ---\n';
            fakeSd.rows.forEach(function(r){ if(r.length) t += r.filter(function(c){return c&&c.toString().trim()&&!isEmailCellVal(String(c));}).join(' | ') + '\n'; });
            return t;
          });
        } else {
          var ckI = emailKeyFor(baseNameI, lblI);
          var legacyI = ['event_'+baseNameI+'_ci'+ci2+'_ri'+ri];
          buildClickSendBtn(lblI, ckI, td, legacyI);
        }
      } else {
        td.textContent=inlineCellVal;
        var cellEditable = editMode || (isUserEditable && ci2>0);
        if(cellEditable){
          td.contentEditable='true'; td.style.cursor='text';
          (function(r,col){
            var pushed=false;
            var baseN = fakeSd.name.replace('_top','').replace('_bot','');
            var rowHasEmail = (fakeSd.rows[r]||[]).some(function(c){ return isEmailCellVal(String(c==null?'':c)); });
            var origLbl = String(fakeSd.rows[r][0]==null?'':fakeSd.rows[r][0]).trim();
            td.oninput=function(){ if(!pushed){pushUndo();pushed=true;} while(fakeSd.rows[r].length<=col) fakeSd.rows[r].push(''); fakeSd.rows[r][col]=this.textContent; saveAll(); };
            td.onblur=function(){
              pushed=false;
              // If the label of an email row was renamed, carry its saved email settings over
              if(col===0 && rowHasEmail){
                var newLbl = String(fakeSd.rows[r][0]==null?'':fakeSd.rows[r][0]).trim();
                if(newLbl && newLbl!==origLbl){
                  migrateEmailKey(emailKeyFor(baseN,origLbl), emailKeyFor(baseN,newLbl));
                  origLbl = newLbl;
                }
              }
            };
          })(ri,ci2);
        }
      }
      if(isUserEditable && ci2===0 && !editMode){ td.style.cssText+='opacity:0.7;font-style:italic;'; }
      tr.appendChild(td);
    }
    tbl.appendChild(tr);
  }
  container.appendChild(tbl);

  // Add row button (edit mode only)
  if(editMode){
    var arBtn=document.createElement('button'); arBtn.className='add-row-btn'; arBtn.style.display='block';
    arBtn.textContent='+ Add Row';
    arBtn.onclick=function(){ pushUndo(); var n=fakeSd.rows.length?fakeSd.rows[0].length:2; var nr=[]; for(var i=0;i<n;i++) nr.push(''); fakeSd.rows.push(nr); persist(); rerender(); };
    container.appendChild(arBtn);
  }
}

</script>
