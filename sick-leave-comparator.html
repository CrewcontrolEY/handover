<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crew Services — Sick Leave Record Comparator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#080f1a;color:#e2e8f0;font-family:"Segoe UI",system-ui,sans-serif;min-height:100vh;}
body.light-mode{background:#f1f5f9;color:#1e293b;}

header{background:#0d1b2e;border-bottom:1px solid #1e2d45;padding:10px 20px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:100;flex-wrap:wrap;}
body.light-mode header{background:#fff;border-color:#e2e8f0;}
.back-to-workflow-btn{background:none;border:1px solid #334155;color:#94a3b8;font-size:11px;padding:6px 11px;border-radius:6px;cursor:pointer;font-family:inherit;}
body.light-mode .back-to-workflow-btn{border-color:#cbd5e1;color:#475569;}
.hdr-title{font-size:15px;font-weight:700;color:#e2e8f0;flex:1;}
body.light-mode .hdr-title{color:#1e293b;}
.hdr-sub{font-size:10px;color:#64748b;letter-spacing:.06em;text-transform:uppercase;display:block;}

/* Theme toggle — copied exactly from workflow.html */
.theme-toggle-wrap{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.theme-icon{font-size:13px;line-height:1;}
.theme-toggle{position:relative;width:38px;height:20px;flex-shrink:0;}
.theme-toggle input{opacity:0;width:0;height:0;position:absolute;}
.theme-toggle-slider{position:absolute;inset:0;background:#1a2236;border:1px solid #1e2d45;border-radius:999px;cursor:pointer;transition:background .25s,border-color .25s;}
.theme-toggle-slider::before{content:'';position:absolute;width:14px;height:14px;left:2px;top:50%;transform:translateY(-50%);background:#64748b;border-radius:50%;transition:transform .25s,background .25s;}
.theme-toggle input:checked + .theme-toggle-slider{background:rgba(0,212,255,.15);border-color:rgba(0,212,255,.5);}
.theme-toggle input:checked + .theme-toggle-slider::before{transform:translateX(18px) translateY(-50%);background:#00d4ff;}

.main{max-width:1180px;margin:0 auto;padding:26px 20px 60px;}

/* Upload cards */
.upload-section{display:flex;gap:16px;flex-wrap:wrap;align-items:stretch;margin-bottom:18px;}
.upload-card{flex:1;min-width:240px;background:#0d1b2e;border:1px solid #1e2d45;border-radius:12px;padding:18px;display:flex;flex-direction:column;gap:10px;}
body.light-mode .upload-card{background:#fff;border-color:#e2e8f0;}
.upload-card-title{font-size:12px;font-weight:700;letter-spacing:.03em;color:#94a3b8;text-transform:uppercase;}
body.light-mode .upload-card-title{color:#475569;}
.upload-btn{background:#1e2d45;border:1px solid #334155;color:#94a3b8;border-radius:7px;padding:10px 18px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;align-self:flex-start;}
.upload-btn:hover{background:#334155;color:#e2e8f0;}
body.light-mode .upload-btn{background:#f1f5f9;border-color:#e2e8f0;color:#64748b;}
body.light-mode .upload-btn:hover{background:#e2e8f0;color:#1e293b;}
.upload-status{font-size:11px;color:#64748b;line-height:1.5;word-break:break-word;}
.upload-status.ok{color:#22c55e;}
.upload-status.err{color:#ef4444;}
body.light-mode .upload-status{color:#475569;}
body.light-mode .upload-status.ok{color:#15803d;}
body.light-mode .upload-status.err{color:#dc2626;}

.debug-toggle{background:none;border:1px solid #334155;color:#64748b;border-radius:5px;padding:3px 9px;font-size:10px;cursor:pointer;font-family:inherit;margin-top:4px;}
.debug-toggle:hover{color:#e2e8f0;border-color:#0ea5e9;}
body.light-mode .debug-toggle{border-color:#c8d8ea;color:#64748b;}
body.light-mode .debug-toggle:hover{color:#1e293b;border-color:#3b82f6;}
.debug-pre{display:none;font-family:monospace;font-size:10px;line-height:1.5;background:#0a1628;border:1px solid #1e2d45;border-radius:6px;padding:9px;margin-top:6px;max-height:260px;overflow:auto;white-space:pre-wrap;color:#8da3c4;}
body.light-mode .debug-pre{background:#f5f9fd;border-color:#c8d8ea;color:#475569;}

/* Compare button */
.compare-wrap{display:flex;justify-content:center;margin:6px 0 26px;}
.compare-btn{background:linear-gradient(135deg,#1d4ed8,#2563eb);border:none;color:#fff;border-radius:9px;padding:13px 36px;font-size:13px;font-weight:700;letter-spacing:.02em;cursor:pointer;font-family:inherit;transition:all .2s;}
.compare-btn:hover:not(:disabled){background:linear-gradient(135deg,#2563eb,#3b82f6);}
.compare-btn:disabled{opacity:.35;cursor:not-allowed;}

/* Legend */
.legend{display:flex;gap:18px;flex-wrap:wrap;align-items:center;font-size:11px;color:#94a3b8;margin-bottom:12px;}
body.light-mode .legend{color:#475569;}
.legend-item{display:flex;align-items:center;gap:6px;}
.legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
.legend-dot.new{background:#16a34a;}
.legend-dot.modified{background:#d97706;}
.legend-count{font-weight:700;color:#e2e8f0;}
body.light-mode .legend-count{color:#1e293b;}

/* Table — reusing the suite's sheet-table look */
.tbl-wrap{overflow-x:auto;border:1px solid #1e2d45;border-radius:10px;}
body.light-mode .tbl-wrap{border-color:#e2e8f0;}
.sheet-table{width:100%;border-collapse:collapse;font-size:12px;}
.sheet-table th,.sheet-table td{padding:7px 10px;border:1px solid #1e2d45;text-align:left;vertical-align:middle;line-height:1.4;white-space:nowrap;}
body.light-mode .sheet-table th,body.light-mode .sheet-table td{border-color:#e2e8f0;}
.sheet-table th{background:#0d1b2e;color:#e2e8f0;font-size:10.5px;text-transform:uppercase;letter-spacing:.03em;font-weight:700;position:sticky;top:0;white-space:normal;min-width:95px;}
body.light-mode .sheet-table th{background:#f1f5f9;color:#1e293b;}
.sheet-table td{color:#cbd5e1;background:#080f1a;}
body.light-mode .sheet-table td{color:#1e293b;background:#fff;}
.sheet-table tr:hover td{background:#0a1422;}
body.light-mode .sheet-table tr:hover td{background:#f8fafc;}

.diff-new td{background:rgba(22,163,74,.12);}
body.light-mode .diff-new td{background:rgba(22,163,74,.08);}
.diff-new:hover td{background:rgba(22,163,74,.20);}
body.light-mode .diff-new:hover td{background:rgba(22,163,74,.14);}
.diff-new td:first-child{border-left:3px solid #16a34a;}

.diff-modified td{background:rgba(217,119,6,.08);}
body.light-mode .diff-modified td{background:rgba(217,119,6,.06);}
.diff-modified:hover td{background:rgba(217,119,6,.16);}
body.light-mode .diff-modified:hover td{background:rgba(217,119,6,.12);}
.diff-modified td:first-child{border-left:3px solid #d97706;}

.diff-cell{background:rgba(217,119,6,.30) !important;color:#fbbf24 !important;font-weight:700;}
body.light-mode .diff-cell{background:rgba(217,119,6,.22) !important;color:#92400e !important;}

.no-data{padding:40px;text-align:center;color:#475569;font-size:12px;font-style:italic;background:#0d1b2e;border:1px solid #1e2d45;border-radius:10px;}
body.light-mode .no-data{background:#fff;border-color:#e2e8f0;}

.results-heading{font-size:13px;font-weight:700;color:#38bdf8;margin-bottom:10px;letter-spacing:.02em;}
body.light-mode .results-heading{color:#1d4ed8;}
</style>
</head>
<body>

<header>
  <button onclick="window.location.href='workflow.html'" class="back-to-workflow-btn" style="margin-right:10px;">← Workflow</button>
  <div style="flex:1;">
    <div class="hdr-title">🩺 Sick Leave Record Comparator</div>
    <span class="hdr-sub">Crew Services Reference</span>
  </div>
  <div class="theme-toggle-wrap">
    <span class="theme-icon">🌙</span>
    <label class="theme-toggle" title="Toggle light / dark mode">
      <input type="checkbox" id="themeToggle" onchange="applyTheme(this.checked)" />
      <span class="theme-toggle-slider"></span>
    </label>
    <span class="theme-icon">☀️</span>
  </div>
</header>

<div class="main">

  <div class="upload-section">
    <div class="upload-card">
      <div class="upload-card-title">1st Sick Leave Record</div>
      <input type="file" id="file1" accept=".pdf,application/pdf" hidden onchange="handleFile(1,this)">
      <button class="upload-btn" onclick="document.getElementById('file1').click()">📄 Choose PDF</button>
      <div class="upload-status" id="status1">No file selected</div>
      <div id="debugWrap1"></div>
    </div>
    <div class="upload-card">
      <div class="upload-card-title">2nd Sick Leave Record</div>
      <input type="file" id="file2" accept=".pdf,application/pdf" hidden onchange="handleFile(2,this)">
      <button class="upload-btn" onclick="document.getElementById('file2').click()">📄 Choose PDF</button>
      <div class="upload-status" id="status2">No file selected</div>
      <div id="debugWrap2"></div>
    </div>
  </div>

  <div class="compare-wrap">
    <button class="compare-btn" id="compareBtn" disabled onclick="runCompare()">⇄ Compare</button>
  </div>

  <div id="resultsArea"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const NUM_COLS = 11;
const STAFF_ID_COL = 3; // 4th column, zero-indexed

// Exact column headers as they appear on the source PDFs
const CANONICAL_HEADERS = [
  'Doctor Name',
  'Patient Name',
  'Job Title',
  'Staff ID',
  'Reg Date',
  'Sick Leave From Outside-From',
  'Sick Leave From Outside-To',
  'Unfit With Certificate-From',
  'Unfit With Certificate-To',
  'ESL From',
  'ESL To'
];

function tokenize(s){
  return s.toLowerCase().split(/[^a-z0-9]+/).filter(Boolean);
}
const HEADER_VOCAB = new Set();
CANONICAL_HEADERS.forEach(h => tokenize(h).forEach(t => HEADER_VOCAB.add(t)));

// A line counts as part of the header band only if every word on it
// belongs to the known header vocabulary — this correctly handles
// headers that wrap across 2–4 lines, and headers repeated on later pages.
function lineIsHeaderish(line){
  return line.items.every(it => {
    const toks = tokenize(it.str);
    return toks.length>0 && toks.every(t => HEADER_VOCAB.has(t));
  });
}

const state = { sheet1:null, sheet2:null };

function applyTheme(checked){
  document.body.classList.toggle('light-mode', checked);
}

function esc(s){
  return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ── Extract text lines (rows) with x positions, per page ──
// Important: we compose each item's transform with the page viewport transform
// (pdfjsLib.Util.transform) rather than reading raw PDF coordinates directly.
// Some PDFs carry a page /Rotate flag (e.g. landscape exports) — PDF.js's raw
// text-item transforms are reported in the page's *pre-rotation* coordinate
// system, while the viewport transform correctly accounts for that rotation
// to match what's actually rendered on screen.
async function extractLines(file){
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  const allLines = [];
  const TOL = 2.5; // px tolerance for grouping items onto the same visual line

  for(let p=1; p<=pdf.numPages; p++){
    const page = await pdf.getPage(p);
    const viewport = page.getViewport({ scale: 1 });
    const content = await page.getTextContent();
    const items = content.items
      .filter(it => it.str && it.str.trim().length>0)
      .map(it => {
        const m = pdfjsLib.Util.transform(viewport.transform, it.transform);
        return { str: it.str, x: m[4], y: m[5], w: it.width || 0 };
      });

    // After the viewport transform, y increases downward (canvas/screen space),
    // so sort ascending to walk the page top-to-bottom.
    items.sort((a,b)=> a.y-b.y || a.x-b.x);

    let cur = null;
    for(const it of items){
      if(cur && Math.abs(cur.y - it.y) <= TOL){
        cur.items.push(it);
      } else {
        cur = { page:p, y: it.y, items:[it] };
        allLines.push(cur);
      }
    }
  }
  allLines.forEach(l => l.items.sort((a,b)=> a.x-b.x));
  return allLines;
}

// ── Derive 11 column x-boundaries by pooling ALL header-band lines
//    (every wrapped line of every header, on every page) ──
function buildColumnModel(lines){
  const headerLines = lines.filter(lineIsHeaderish);
  const headerSample = headerLines.map(l => ({
    y: Math.round(l.y),
    items: l.items.map(it => ({ text: it.str, x: Math.round(it.x) }))
  }));

  if(headerLines.length === 0){
    return { ok:false, error:'Could not detect the header row (Doctor Name / Patient Name / … / ESL To) in this PDF.', headerLinesCount:0, headerSample };
  }

  const xs = [];
  headerLines.forEach(line => line.items.forEach(it => xs.push(it.x)));
  xs.sort((a,b)=> a-b);

  if(xs.length < NUM_COLS){
    return { ok:false, error:'Only found ' + xs.length + ' header text segments — fewer than the expected 11 columns.', headerLinesCount:headerLines.length, headerSample };
  }

  const gaps = [];
  for(let i=0;i<xs.length-1;i++) gaps.push({ idx:i, gap: xs[i+1]-xs[i] });
  const top = [...gaps].sort((a,b)=> b.gap-a.gap).slice(0, NUM_COLS-1)
    .map(g=>g.idx).sort((a,b)=>a-b);

  let boundaries = top.map(idx => (xs[idx] + xs[idx+1]) / 2);
  boundaries = [-Infinity, ...boundaries, Infinity];

  const colIndexForX = (x) => {
    for(let c=0;c<NUM_COLS;c++){
      if(x >= boundaries[c] && x < boundaries[c+1]) return c;
    }
    return NUM_COLS-1;
  };

  return {
    ok:true, colIndexForX,
    boundaries: boundaries.map(b => (b===Infinity||b===-Infinity) ? b : Math.round(b)),
    headerLinesCount: headerLines.length, headerSample
  };
}

// Note: data text content is deliberately NOT included in the debug output below
// (only character counts and column assignments) so diagnostics stay PII-free.
function buildRows(lines, model){
  const rows = [];
  const sampleRows = [];
  let candidateLines = 0, droppedTooFew = 0, droppedNoId = 0;

  lines.forEach(line => {
    if(lineIsHeaderish(line)) return; // skip header band, incl. repeats on later pages
    candidateLines++;

    const row = new Array(NUM_COLS).fill('');
    const assigned = [];
    line.items.forEach(it => {
      const c = model.colIndexForX(it.x);
      row[c] = (row[c] ? row[c]+' ' : '') + it.str.trim();
      assigned.push({ col:c, len: it.str.trim().length, x: Math.round(it.x) });
    });
    const trimmed = row.map(c=>c.trim());
    const nonEmpty = trimmed.filter(c=>c!=='').length;
    const hasStaffId = !!trimmed[STAFF_ID_COL];

    if(sampleRows.length < 6){
      sampleRows.push({ nonEmptyCols: nonEmpty, hasStaffId, itemAssignments: assigned });
    }

    if(nonEmpty < 3){ droppedTooFew++; return; }
    if(!hasStaffId){ droppedNoId++; return; }
    rows.push(trimmed);
  });

  return { rows, debug:{ totalLines: lines.length, candidateLines, droppedTooFew, droppedNoId, kept: rows.length, sampleRows } };
}

async function parsePdf(file){
  const lines = await extractLines(file);
  const model = buildColumnModel(lines);

  if(!model.ok){
    throw Object.assign(new Error(model.error), {
      debug: { totalLines: lines.length, headerLinesCount: model.headerLinesCount, headerSample: model.headerSample }
    });
  }

  const { rows, debug } = buildRows(lines, model);
  debug.headerLinesCount = model.headerLinesCount;
  debug.headerSample = model.headerSample;
  debug.boundaries = model.boundaries;
  return { headers: CANONICAL_HEADERS, rows, debug };
}

// ── Upload handling ──
async function handleFile(n, input){
  const file = input.files[0];
  if(!file) return;
  const statusEl = document.getElementById('status'+n);
  const debugWrap = document.getElementById('debugWrap'+n);
  statusEl.className = 'upload-status';
  statusEl.textContent = '⏳ Parsing ' + file.name + ' …';
  debugWrap.innerHTML = '';

  try{
    const { headers, rows, debug } = await parsePdf(file);
    state['sheet'+n] = { headers, rows, filename: file.name };
    statusEl.className = 'upload-status ok';
    statusEl.textContent = '✓ ' + file.name + ' — ' + rows.length + ' rows detected';
    renderDebug(n, debug);
  } catch(err){
    state['sheet'+n] = null;
    statusEl.className = 'upload-status err';
    statusEl.textContent = '✗ ' + file.name + ' — ' + err.message;
    if(err.debug) renderDebug(n, err.debug);
  }

  document.getElementById('compareBtn').disabled = !(state.sheet1 && state.sheet2);
  document.getElementById('resultsArea').innerHTML = '';
}

function renderDebug(n, debug){
  const wrap = document.getElementById('debugWrap'+n);
  if(!debug){ wrap.innerHTML=''; return; }
  const id = 'debugPre'+n;
  wrap.innerHTML =
    '<button class="debug-toggle" onclick="document.getElementById(\'' + id + '\').style.display=document.getElementById(\'' + id + '\').style.display===\'block\'?\'none\':\'block\'">🐞 Diagnostics</button>' +
    '<pre class="debug-pre" id="' + id + '">' + esc(JSON.stringify(debug, null, 2)) + '</pre>';
}

// ── Compare: differences / additions on sheet 2 relative to sheet 1 ──
function runCompare(){
  const s1 = state.sheet1, s2 = state.sheet2;
  if(!s1 || !s2) return;

  const map1 = new Map();
  s1.rows.forEach(r => map1.set(r[STAFF_ID_COL], r));

  const diffs = [];
  s2.rows.forEach(r2 => {
    const id = r2[STAFF_ID_COL];
    if(!map1.has(id)){
      diffs.push({ type:'new', row:r2, changed:[] });
    } else {
      const r1 = map1.get(id);
      const changed = [];
      for(let c=0;c<NUM_COLS;c++){
        if((r1[c]||'') !== (r2[c]||'')) changed.push(c);
      }
      if(changed.length) diffs.push({ type:'modified', row:r2, changed });
    }
  });

  const headers = CANONICAL_HEADERS;
  renderResults(headers, diffs);
}

function renderResults(headers, diffs){
  const area = document.getElementById('resultsArea');
  const newCount = diffs.filter(d=>d.type==='new').length;
  const modCount = diffs.length - newCount;

  if(diffs.length === 0){
    area.innerHTML = '<div class="no-data">No differences found — the 2nd Sick Leave Record matches the 1st.</div>';
    return;
  }

  let html = '';
  html += '<div class="results-heading">Differences found: ' + diffs.length + '</div>';
  html += '<div class="legend">';
  html += '<div class="legend-item"><span class="legend-dot new"></span>New in 2nd record <span class="legend-count">(' + newCount + ')</span></div>';
  html += '<div class="legend-item"><span class="legend-dot modified"></span>Changed vs 1st record <span class="legend-count">(' + modCount + ')</span></div>';
  html += '</div>';

  html += '<div class="tbl-wrap"><table class="sheet-table"><thead><tr>';
  headers.forEach(h => html += '<th>' + esc(h||'') + '</th>');
  html += '</tr></thead><tbody>';

  diffs.forEach(d => {
    html += '<tr class="' + (d.type==='new' ? 'diff-new' : 'diff-modified') + '">';
    d.row.forEach((cell, c) => {
      const isChanged = d.changed.includes(c);
      html += '<td' + (isChanged ? ' class="diff-cell"' : '') + '>' + esc(cell) + '</td>';
    });
    html += '</tr>';
  });

  html += '</tbody></table></div>';
  area.innerHTML = html;
}
</script>
</body>
</html>
