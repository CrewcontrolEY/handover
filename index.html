.tab-item{display:flex;align-items:center;border-bottom:2px solid transparent;flex-shrink:0}
.tab-item.active{border-bottom-color:#00d4ff}
.tab-name{background:transparent;border:none;color:#7b8aaa;font-family:monospace;font-size:11px;font-weight:700;padding:10px 4px 10px 12px;white-space:nowrap;min-width:30px;outline:none}
.tab-item.active .tab-name{color:#00d4ff}
.tab-del,.tab-arr,.tab-add{background:none;border:none;color:#64748b;font-family:monospace}
.tab-del{padding:0 6px 0 2px;font-size:11px;opacity:.55}.tab-del:hover{color:#ff4757;opacity:1}
.tab-arr{padding:0 2px;font-size:10px;opacity:.45}.tab-arr:hover{opacity:1;color:#e2e8f0}
.tab-add{font-size:13px;padding:8px 12px;flex-shrink:0}.tab-add:hover{color:#00d4ff}

.sec-ctrl{background:none;border:none;color:#64748b;font-size:12px;padding:1px 5px;border-radius:3px}.sec-ctrl:hover{color:#e2e8f0;background:rgba(255,255,255,.05)}.sec-ctrl.del:hover{color:#ff4757}
.sec-body{padding:10px 12px}
.tbl-wrap{overflow:auto;border:1px solid #1e2d45;border-radius:8px}

tbody td{border-bottom:1px solid #1e2d45;border-right:1px solid #1e2d45;padding:0;vertical-align:top}

.col-bar{display:flex;flex-wrap:wrap;gap:4px;align-items:center;margin-bottom:7px}.col-chip{display:inline-flex;gap:2px;align-items:center;background:#1a2236;border-radius:4px;padding:1px 4px}.col-chip span{font-size:9px;color:#8da3c4;font-family:monospace;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.td-ctrl{width:56px;text-align:center;vertical-align:middle;background:#0d1527}
textarea.note{background:transparent;border:1px solid #1e2d45;color:#e2e8f0;border-radius:8px;padding:10px 12px;min-height:80px;width:100%;resize:none;outline:none;line-height:1.6;overflow:hidden;box-sizing:border-box}

.note-img-del:hover{background:#ff4757}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}.btn{border:none;border-radius:8px;padding:10px 16px;font-weight:700;cursor:pointer}.btn-primary{background:linear-gradient(135deg,#00d4ff,#0088ff);color:#00131e}.btn-danger{background:linear-gradient(135deg,#e53e3e,#c53030);color:#fff}.btn-secondary{background:#1a2236;border:1px solid #1e2d45;color:#e2e8f0}.btn-purple{background:linear-gradient(135deg,#7c3aed,#5b21b6);color:#fff}.small{font-size:11px;padding:7px 10px;border-radius:6px}
.note-line{font-family:monospace;font-size:10px;color:#64748b;margin-bottom:8px}
.item-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}.item-row input{flex:1;background:#0a0f1e;border:1px solid #1e2d45;border-radius:8px;color:#e2e8f0;padding:8px 10px}.item-row select{background:#0a0f1e;border:1px solid #1e2d45;border-radius:8px;color:#e2e8f0;padding:8px}
.ai-box{background:#0b1325;border:1px solid #1e2d45;border-radius:10px;padding:12px;white-space:pre-wrap;line-height:1.65;font-size:13px}
.sn-callout{background:rgba(0,212,255,.07);border:1px solid rgba(0,212,255,.25);border-left:3px solid #00d4ff;border-radius:6px;padding:10px 13px;margin:6px 0 4px;white-space:normal}
.sn-callout-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#00d4ff;margin-bottom:7px}
.sn-brief-line{font-size:12.5px;line-height:1.6;color:#c8d8f0;padding:2px 0}
.sn-loading{opacity:.6;font-size:12px;color:#7a9cc0;font-style:italic}
.sn-tag{display:inline-block;background:rgba(0,212,255,.15);color:#00d4ff;font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border-radius:3px;padding:1px 5px;margin-right:6px;vertical-align:middle}
.badge{display:inline-block;padding:3px 8px;border-radius:999px;font-size:10px;font-family:monospace;border:1px solid #1e2d45;color:#9bb0d1}
.count-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px}.count-card{background:#0b1325;border:1px solid #1e2d45;border-radius:10px;padding:12px}.count-card .num{font-size:22px;font-weight:800;color:#00d4ff}
.add-row{margin-top:8px}.footer-note{color:#64748b;font-family:monospace;font-size:10px;margin-top:6px}
.add-tab-row,.add-sec-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;border-top:1px solid #1e2d45;padding-top:10px;margin-top:10px}
.label{font-size:9px;color:#64748b;font-family:monospace}
.photo-list{display:flex;flex-direction:column;gap:12px}.photo-item{background:#1a2236;border:1px solid #1e2d45;border-radius:10px;overflow:hidden;display:flex;flex-direction:column}.photo-item img{width:100%;object-fit:contain;display:block;background:#0a0f1e}.photo-item-footer{display:flex;align-items:center;gap:8px;padding:6px 10px;border-top:1px solid #1e2d45}.photo-cap{background:transparent;border:none;color:#8da3c4;font-size:11px;font-family:monospace;flex:1;outline:none}.photo-size-label{font-size:9px;color:#64748b;font-family:monospace;white-space:nowrap}.photo-size-slider{appearance:none;width:90px;height:3px;border-radius:2px;background:#1e2d45;outline:none;cursor:pointer}.photo-size-slider::-webkit-slider-thumb{appearance:none;width:12px;height:12px;border-radius:50%;background:#00d4ff;cursor:pointer}.photo-size-input{width:68px;background:#0a0f1e;border:1px solid #1e2d45;border-radius:5px;color:#00d4ff;font-family:monospace;font-size:11px;padding:2px 6px;text-align:center}.photo-del{background:rgba(0,0,0,.7);border:none;color:#fff;border-radius:50%;width:20px;height:20px;font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}.photo-del:hover{background:#ff4757}.photo-add-btn{background:#1a2236;border:1px dashed #1e2d45;border-radius:8px;padding:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:#64748b;font-size:11px;font-family:monospace;cursor:pointer;width:100%}.photo-add-btn:hover{border-color:#00d4ff;color:#00d4ff}
/* ── ORB / WEATHER ADVISORIES SECTION STYLES ── */
.orb-section{background:#0b1325;border:1px solid #1e2d45;border-radius:10px;margin-bottom:12px;overflow:hidden}
.orb-section-hdr{display:flex;align-items:center;gap:6px;padding:8px 12px;background:#1a2236;border-bottom:1px solid #1e2d45}

.orb-card{border-radius:8px;padding:10px 12px;margin-bottom:8px;border:1px solid}

/* ── LIGHT MODE TOGGLE SWITCH ── */
.theme-toggle-wrap{display:flex;align-items:center;gap:7px;margin-right:10px;flex-shrink:0}
.theme-toggle-label{font-family:monospace;font-size:9px;color:#64748b;letter-spacing:.08em;text-transform:uppercase;user-select:none;transition:color .25s}
.theme-toggle{position:relative;width:38px;height:20px;flex-shrink:0}
.theme-toggle input{opacity:0;width:0;height:0;position:absolute}
.theme-toggle-slider{position:absolute;inset:0;background:#1a2236;border:1px solid #1e2d45;border-radius:999px;cursor:pointer;transition:background .25s,border-color .25s}
.theme-toggle-slider::before{content:'';position:absolute;width:14px;height:14px;left:2px;top:50%;transform:translateY(-50%);background:#64748b;border-radius:50%;transition:transform .25s,background .25s}
.theme-toggle input:checked + .theme-toggle-slider{background:rgba(0,212,255,.15);border-color:rgba(0,212,255,.5)}
.theme-toggle input:checked + .theme-toggle-slider::before{transform:translateX(18px) translateY(-50%);background:#00d4ff}
.theme-icon{font-size:13px;line-height:1;transition:opacity .2s}

/* ── Loop Tasks theme-aware styles ── */

.lt-ct.done{color:#15803d;font-weight:600;}

/* ── Auto-expand textareas ── */
function autoExpand(el){
  el.style.height='auto';
  el.style.height=el.scrollHeight+'px';
}

/* ── Bullet-point shortcut: type * or - anywhere, press Space → • ── */
function handleBulletKeys(e){
  const ta=e.target;
  const pos=ta.selectionStart;
  const val=ta.value;
  const lineStart=val.lastIndexOf('\n',pos-1)+1;
  const lineText=val.substring(lineStart,pos);

  if(e.key===' '){
    // "* " or "- " at start of line → bullet
    if(lineText==='*' || lineText==='-'){
      e.preventDefault();
      ta.value=val.substring(0,lineStart)+'• '+val.substring(pos);
      const newPos=lineStart+2;
      ta.setSelectionRange(newPos,newPos);
      ta.dispatchEvent(new Event('input',{bubbles:true}));
      autoExpand(ta);
      return;
    }
    // "• * " or "• - " inside a bullet line → nested indicator
    if((lineText==='• *' || lineText==='• -')){
      e.preventDefault();
      ta.value=val.substring(0,lineStart)+'  • '+val.substring(pos);
      const newPos=lineStart+4;
      ta.setSelectionRange(newPos,newPos);
      ta.dispatchEvent(new Event('input',{bubbles:true}));
      autoExpand(ta);
      return;
    }
  }

  if(e.key==='Enter'){
    const trimmed=val.substring(lineStart,pos);
    // Continue bullet list on Enter
    if(trimmed.startsWith('• ') || trimmed.startsWith('  • ')){
      const prefix=trimmed.startsWith('  • ')?'  • ':'• ';
      if(trimmed===prefix){
        // empty bullet line → exit list
        e.preventDefault();
        ta.value=val.substring(0,lineStart)+'\n'+val.substring(pos);
        ta.setSelectionRange(lineStart+1,lineStart+1);
        ta.dispatchEvent(new Event('input',{bubbles:true}));
      } else {
        e.preventDefault();
        const insert='\n'+prefix;
        ta.value=val.substring(0,pos)+insert+val.substring(pos);
        ta.setSelectionRange(pos+insert.length,pos+insert.length);
        ta.dispatchEvent(new Event('input',{bubbles:true}));
      }
      autoExpand(ta);
    }
  }
}

 Context", "value": "\u2022 CHS delivery flights: Key Points: \nHotel and transport confirmed and arranged by Hotel Connections. In case of any changes or delays, please contact them directly. \nHotel: Hyatt Place Charleston Airport \nTransport provider: Basic Black Limo. Driver contact details will be provided one day prior to the crew's arrival TBA\t \nNo Cabin Crew will be carried on either flight. \nRegular Boeing Cost code can now be used \nShould any crew be removed, please liaise with Boeing Fleet for crew replacement \n\n\u2022 TLS delivery flights: Key Points: \nHotel and transport confirmed and arranged by Hotel Connections. In case of any changes or delays, please contact them directly. Hotel: NH Toulouse Airport. \nTransport provider: TBA \nNo Cabin Crew will be carried on any flight. \nRegular Airbus Cost code can now be used  \nShould any crew be removed, please liaise with Airbus Fleet for crew replacement \n\n\u2022 BEY & TLV - No crew suppy/observation/training flights UFN. \nBEY/AMM/TLV - CP PEG experience required. No additional restrictions. \nCabin crew - no additional restrictions apart for those nationalities already restricted in AIMS \nEY599-600 night-time departure \u2013 Due curfew in TLV, EY600 has only a 45-minute buffer to depart TLV. Pls ensure there are no delays to EY599 as layover in TLV is not possible in case of delays. \n\n\u2022 KBL - CAT C airport. Currently crewed crew are approved by the fleet. In case of sickness, pls contact Fleet. \nNo supy or observation to be planned on these flights \nThis is a Cat C operation for Pilots; every flight until the end of March is a training flight. In case of sickness, please ensure you liaise with Training Recovery for replacement. They will escalate to PDM and TDM in case of any issues. \n\n\u2022 IST \u2013 all pairings for the IST EY541/542 for narrow body & wide body have been updated in Aims with the reduced report time.  \nThere should be no Flight Crew or Cabin Crew training planned for this flight.  \nThe pairings have been updated with the following route memo (For any aircraft changes please make sure the route memo is updated with the correct fleet type): \nA320 \u2013 The report time is reduced by 10 minutes to STD minus 65.\u202f Crew to expedite departure from CBC. \u202fRefer to Bulletin\u202fB.25.023.ALL\nB787 \u2013 The report time is reduced by 10 minutes to STD minus 80.\u202f Crew to expedite departure from CBC. \u202fRefer to Bulletin\u202fB.25.023.ALL\n\n\u2022 HKG - Crew DHD on OAL to HKG should be from the list of countries which do not require visa as per the link: https://www.immd.gov.hk/eng/services/visas/visit-transit/visit-visa-entry-permit.html  \nOperating crew to HKG - regardless of the Nationality, only CMC holders can operate into HKG. \n\n\u2022 MEL: If the MEL flight is delayed and MEL arrives more than one hour late, the on-duty DM should consult with Fabio to determine if switching the crew hotel is necessary.  This is until further notice. \n\n\u2022 DOH: For crew travelling to DOH for training purposes, DHD tickets have been requested as full fare Pax, hence tracker is not required to be updated or checked. \n\n\u2022 Care Team on duty: 02 511 3130. \n\n\u2022 Please email Shafi \u2013 Mshafi@etihad.ae if you experience delays on receipt of sick leave report from EAMC.mailto:Care@etihad.ae \n\n\u2022 Chinese crew members will be assigned on Indian turnaround flights for their suppy. No Indian layovers are permitted but in case of emergency, they will be given a permit on case-by-case basis. \n\n\u2022 A380 EIS program cost center: O-A380EISO1.  All expenses related to A380 EIS must be assigned to this Cost Center. \n \n\u2022 NBO - Operating crew on Gendec both on inbound & outbound do not require an entry visa. However, if a crew arrives as operating crew on Gendec & departs on commercial airline as passenger or vice versa, they will need to obtain an entry visa prior to departure. In that scenario, they will need to get a passport stamped both on arrival and departure. \n \n\u2022 SVO & LED: Russian national crew must carry both their passport used for international travel & the Russian internal passport (internal identity document) when laying over in SVO and LED. \n\n\u2022 KTI \u2013 Layovers up to 48 hours: No visa required. \nLayovers over 48 hours & up to 5 days: Type D visa required, costing $15 per crew member. The hotel will make the payment and charge it back to EY. \nImmigration authorities will be notified, and each case will be reviewed individually. A penalty of $10 per crew member per day   may be imposed. If a penalty is applied, the same procedure will follow — the hotel will pay the penalty and invoice EY accordingly. \n", "placeholder": "Enter notes..."}]}, {"id": "osl295h", "label": "DELAYED FLIGHTS", "sections": [{"id": "38z06z9", "type": "table", "title": "Delayed Flights — Inbound", "tbl": {"cols": [{"id": "c0", "name": "Flight #"}, {"id": "kp747we", "name": "Date"}, {"id": "c1", "name": "Sector"}, {"id": "c3", "name": "ETD (z)"}, {"id": "c4", "name": "Notes"}], "rows": [{"id": "r0", "cells": {"c0": "EY127", "c1": "MUC-AUH (test)", "c3": "1030z", "c4": "", "kp747we": "26-May\n"}}, {"id": "r1", "cells": {"c0": "EY112", "c1": "BCN-AUH (test)", "c3": "1040z", "c4": "", "kp747we": "26-May"}}, {"id": "r2", "cells": {"c0": "EY62", "c1": "LHR-AUH (test)", "c3": "1120z", "c4": "", "kp747we": "26-May"}}, {"id": "r3", "cells": {"c0": "EY78", "c1": "MAN-AUH (test)", "c3": "1135z", "c4": "", "kp747we": "26-May"}}]}}, {"id": "sx8i360", "type": "table", "title": "Delayed Flights — Outbound", "tbl": {"cols": [{"id": "c0", "name": "Flight #"}, {"id": "lwrpsdp", "name": "Date"}, {"id": "c1", "name": "Sector"}, {"id": "c3", "name": "ETD (z)"}, {"id": "c4", "name": "Notes"}], "rows": [{"id": "r0", "cells": {"c0": "EY474", "c1": "AUH-CGK (test)", "c3": "19h10z", "c4": "", "lwrpsdp": "26-May"}}, {"id": "r1", "cells": {"c0": "EY218", "c1": "AUH-DEL (test)", "c3": "190 function loadState(){
  try{ const raw=localStorage.getItem(LS_KEY); if(raw){ const parsed=JSON.parse(raw); shiftTime=parsed.shiftTime||shiftTime; if(parsed.orbSummaries) orbSummaries=parsed.orbSummaries; var st=parsed.state||getBakedState(); if(st&&st.tabs){ var hasLoop=st.tabs.find(function(t){ return t.sections&&t.sections[0]&&t.sections[0].type==='looptasks'; }); if(!hasLoop){ var aiIdx=st.tabs.findIndex(function(t){ return t.label&&t.label.toUpperCase()==='AI SUMMARY'; }); var loopTab={id:'looptab1',label:'LOOP TASKS',noExport:true,sections:[{id:'loopsec1',type:'looptasks',title:'Shift Handover Tasks',assignees:[{id:'a1',name:'Cabin Crew Desk',locked:true},{id:'a2',name:'Flight Deck',locked:true},{id:'a3',name:'LM/RE',locked:true}],tasks:[],activityLog:[]}]}; if(aiIdx>=0){ st.tabs.splice(aiIdx,0,loopTab); } else { st.tabs.push(loopTab); } } } return st; } }catch(e){}
  return getBakedState();
}
function saveLocal(){ try{ localStorage.setItem(LS_KEY, JSON.stringify({shiftTime,state,orbSummaries})); }catch(e){} }
function clearData(){ if(!confirm('Reset all local data?')) return; state=getDefaultState(); shiftTime='1500z'; orbSummaries=[]; activeTabId=state.tabs[0].id; history=[]; future=[]; localStorage.removeItem(LS_KEY); render(); }
function exportJsonOverride(){ const blob=new Blob([JSON.stringify({shiftTime,state,orbSummaries},null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='crew-handover-latest.json'; a.click(); }

document.getElementById('importJsonInput').addEventListener('change', function(e){
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=function(ev){
    try{ const parsed=JSON.parse(ev.target.result); snapshot(); shiftTime=parsed.shiftTime||shiftTime; state=parsed.state || parsed; activeTabId=state.tabs?.[0]?.id || activeTabId;
      /* ORB: restore orbSummaries from imported JSON if present */
      if(parsed.orbSummaries && Array.isArray(parsed.orbSummaries)) orbSummaries=parsed.orbSummaries;
      saveLocal(); render(); alert('Previous handover imported'); }
    catch(err){ alert('Invalid JSON file'); }
  };
  r.readAsText(file); e.target.value='';
});

document.getElementById('photoInput').addEventListener('change', function(e){
  const files=[...e.target.files]; if(!files.length || !photoTarget.tabId || !photoTarget.secId) return;
  const tab = state.tabs.find(t=>t.id===photoTarget.tabId); if(!tab) return;
  const sec = tab.sections.find(s=>s.id===photoTarget.secId); if(!sec || sec.type!=='photos') return;
  let pending=files.length;
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      sec.photos.push({id:uid(),src:ev.target.result,caption:file.name,size:455});
      pending--; if(!pending){ saveLocal(); render(); }
    };
    reader.readAsDataURL(file);
  });
  e.target.value='';
});

function updateClock(){ const n=new Date(); document.getElementById('clock').textContent=n.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})+' · '+String(n.getUTCHours()).padStart(2,'0')+':'+String(n.getUTCMinutes()).padStart(2,'0')+'z'; }
setInterval(updateClock,1000); updateClock();

/* ── THEME TOGGLE ── */
function toggleTheme(isLight){
  document.body.classList.toggle('light-mode', isLight);
  try{ localStorage.setItem('crew_handover_theme', isLight ? 'light' : 'dark'); }catch(e){}
  if(typeof render === 'function') render();
}
(function initTheme(){
  try{
    const saved=localStorage.getItem('crew_handover_theme');
    if(saved==='light'){
      document.body.classList.add('light-mode');
      const cb=document.getElementById('themeToggle');
      if(cb) cb.checked=true;
    }
  }catch(e){}
})();

function getTab(){ return state.tabs.find(t=>t.id===activeTabId) || state.tabs[0]; }
function getSec(tab, secId){ return tab.sections.find(s=>s.id===secId); }
if(!activeTabId) activeTabId = state.tabs[0].id;

function renderShiftButtons(){ const row=document.getElementById('shiftRow'); row.innerHTML=''; ['0300z','0700z','1100z','1500z','1900z','2300z'].forEach(t=>{ const b=document.createElement('button'); b.className='sbt'+(t===shiftTime?' active':''); b.textContent=t; b.onclick=()=>{shiftTime=t; saveLocal(); renderShiftButtons();}; row.appendChild(b); }); }

function renderTabs(){
  const nav=document.getElementById('navwrap'); nav.innerHTML='';
  state.tabs.forEach((tab,ti)=>{
    const item=document.createElement('div'); item.className='tab-item'+(tab.id===activeTabId?' active':'');
    if(ti>0){ const left=document.createElement('button'); left.className='tab-arr'; left.textContent='◀'; left.onclick=(e)=>{e.stopPropagation(); snapshot(); [state.tabs[ti-1],state.tabs[ti]]=[state.tabs[ti],state.tabs[ti-1]]; saveLocal(); render();}; item.appendChild(left);}    
    const name=document.createElement('input'); name.className='tab-name'; name.value=tab.label; name.style.width=Math.max(50, tab.label.length*8.7)+'px'; name.onclick=()=>{activeTabId=tab.id; render();}; name.oninput=(e)=>{ snapshot(); tab.label=e.target.value; saveLocal(); }; item.appendChild(name);
    const del=document.createElement('button'); del.className='tab-del'; del.textContent='✕'; del.title='Delete tab'; del.onclick=(e)=>{ e.stopPropagation(); if(!confirm(`Delete tab '${tab.label}'?`)) return; snapshot(); state.tabs=state.tabs.filter(t=>t.id!==tab.id); activeTabId=state.tabs[0]?.id || null; saveLocal(); render(); }; item.appendChild(del);
    if(ti<state.tabs.length-1){ const right=document.createElement('button'); right.className='tab-arr'; right.textContent='▶'; right.onclick=(e)=>{e.stopPropagation(); snapshot(); [state.tabs[ti],state.tabs[ti+1]]=[state.tabs[ti+1],state.tabs[ti]]; saveLocal(); render();}; item.appendChild(right);}    
    nav.appendChild(item);
  });
  const add=document.createElement('button'); add.className='tab-add'; add.textContent='+ Tab'; add.onclick=()=>{ const form=document.createElement('div'); form.className='tab-add-form'; const inp=document.createElement('input'); inp.className='photo-size-input'; inp.style.width='150px'; inp.placeholder='Tab name...'; const ok=document.createElement('button'); ok.className='btn btn-primary small'; ok.textContent='✓'; const cancel=document.createElement('button'); cancel.className='btn btn-secondary small'; cancel.textContent='✕'; form.append(inp,ok,cancel); nav.replaceChild(form,add); inp.focus(); const confirmAdd=()=>{ if(!inp.value.trim()) return; snapshot(); const nt={id:uid(), label:inp.value.trim().toUpperCase(), sections:[notesSection('Notes','')]}; state.tabs.push(nt); activeTabId=nt.id; saveLocal(); render(); }; ok.onclick=confirmAdd; cancel.onclick=()=>renderTabs(); inp.onkeydown=(e)=>{ if(e.key==='Enter') confirmAdd(); if(e.key==='Escape') renderTabs(); }; };
  nav.appendChild(add);
}

function esc(v){ return String(v??'').replace(/[&<>\"]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s])); }

function buildTable(sec, tab){
  const wrap=document.createElement('div'); wrap.className='sec-body';
  const bar=document.createElement('div'); bar.className='col-bar'; bar.innerHTML='<span class="label">COLS:</span>';
  sec.tbl.cols.forEach((col,ci)=>{
    const chip=document.createElement('span'); chip.className='col-chip';
    const name=document.createElement('span'); name.textContent=col.name; chip.appendChild(name);
    const plus=document.createElement('button'); plus.className='btn btn-primary small'; plus.style.padding='0 5px'; plus.textContent='+'; plus.onclick=()=>{ snapshot(); const id=uid(); sec.tbl.cols.splice(ci+1,0,{id,name:'Col '+(sec.tbl.cols.length+1)}); sec.tbl.rows.forEach(r=>r.cells[id]=''); saveLocal(); render();};
    const minus=document.createElement('button'); minus.className='btn btn-danger small'; minus.style.padding='0 5px'; minus.textContent='−'; minus.onclick=()=>{ if(sec.tbl.cols.length<=1) return; snapshot(); const colId=col.id; sec.tbl.cols=sec.tbl.cols.filter(c=>c.id!==colId); sec.tbl.rows.forEach(r=>delete r.cells[colId]); saveLocal(); render();};
    chip.append(plus,minus); bar.appendChild(chip);
  });
  const addCol=document.createElement('button'); addCol.className='btn btn-secondary small'; addCol.textContent='+ Col'; addCol.onclick=()=>{ snapshot(); const id=uid(); sec.tbl.cols.push({id,name:'Col '+(sec.tbl.cols.length+1)}); sec.tbl.rows.forEach(r=>r.cells[id]=''); saveLocal(); render(); }; bar.appendChild(addCol);
  wrap.appendChild(bar);
  const tw=document.createElement('div'); tw.className='tbl-wrap';
  const table=document.createElement('table');
  let thead='<thead><tr>';
  sec.tbl.cols.forEach(col=>{ thead+=`<th><input value="${esc(col.name)}" oninput="updateColName('${tab.id}','${sec.id}','${col.id}',this.value)" /></th>`; });
  thead+='<th style="width:56px;text-align:center;color:#64748b;font-size:8px;padding:6px 2px;background:rgba(0,212,255,.06)">ROW ±</th></tr></thead>';
  let tbody='<tbody>';

function summarize(){
  let delays=0, fdp=0, aog=0, sick=0, discretion=0;
  state.tabs.forEach(tab=>{
    const label=tab.label.toUpperCase();
    tab.sections.forEach(sec=>{
      if(sec.type!=='table') return;
      const count=countFilledRows(sec);
      if(label.includes('DELAY')) delays += count;
      if(label.includes('POTENTIAL VIOLATIONS')) fdp += count;
      const secTitle=(sec.title||'').toUpperCase(); if(secTitle.includes('AOG')||secTitle.includes('AIRCRAFT AOG')||secTitle.includes('AIRCRAFT UNSERVICEABLE')) aog += count;
      if(label.includes('SICK')) sick += count;
      if(label.includes('DISCRETION')) discretion += count;
    });
  });
  const items=collectOpenItems();
  const high=items.filter(i=>i.priority==='high').map(i=>i.text.trim());
  const med=items.filter(i=>i.priority==='medium').map(i=>i.text.trim());
  const low=items.filter(i=>i.priority==='low').map(i=>i.text.trim());
  const highlights=[];
  if(delays) highlights.push(`${delays} delay record(s) logged across delay-related tabs.`);
  if(fdp) highlights.push(`${fdp} potential violation(s) recorded.`);
  if(aog) highlights.push(`${aog} AOG / aircraft status item(s) require monitoring.`);
  if(sick) highlights.push(`${sick} sick crew outstation case(s) logged.`);
  if(discretion) highlights.push(`${discretion} discretion report(s) recorded.`);
  if(!highlights.length) highlights.push('No operational disruptions captured in the counted sections.');
  const shiftSummary=`Shift ${shiftTime} handover prepared with ${delays} delay item(s), ${fdp} potential violation(s), ${aog} AOG or aircraft status item(s), ${sick} sick crew outstation case(s), and ${discretion} discretion report(s). Operations require continued monitoring of recorded disruptions, open items, and any follow-up actions captured in the handover tabs.`;
  /* collect SHIFT NOTES from HANDOVER NOTES tab */
  const shiftNotesLines=[];
  state.tabs.forEach(tab=>{
    if(!tab.label.toUpperCase().includes('HANDOVER NOTES')) return;
    tab.sections.forEach(sec=>{
      if(sec.type==='notes'&&sec.title&&sec.title.toUpperCase().includes('SHIFT NOTES')&&sec.value&&sec.value.trim()){
        sec.value.split('\n').forEach(l=>{ if(l.trim()) shiftNotesLines.push(l.trim()); });
      }
    });
  });
  /* collect OPS UPDATES tab content — Operational Notices table only */
  const opsLines=[];
  state.tabs.forEach(tab=>{
    if(!tab.label.toUpperCase().includes('OPS UPDATE')) return;
    tab.sections.forEach(sec=>{
      if(sec.type==='table'&&sec.tbl&&(sec.title||'').toUpperCase().includes('OPERATIONAL NOTICES')){
        sec.tbl.rows.forEach(row=>{
          const vals=sec.tbl.cols.map(c=>String(row.cells[c.id]||'').trim()).filter(v=>v);
          if(vals.length) opsLines.push(vals.join(' | '));
        });
      }
    });
  });
  const opsContent=opsLines.length?opsLines:['None'];
  const actions=[]; if(delays) actions.push('Review delayed flights and confirm crew / aircraft recovery actions.'); if(fdp) actions.push('Check all potential violations for operational impact and mitigation status.'); if(aog) actions.push('Track AOG / aircraft serviceability updates and update impacted operations.'); if(sick) actions.push('Review sick crew coverage, below-min impacts, and replacement plans.'); if(discretion) actions.push('Review discretion reports and verify LRV cases require GCAA report submission.'); if(!actions.length) actions.push('No pending follow-up identified from structured sections.');
  /* ── GCAA / Complement flags ── */
  const gcaaFlags=[];
  state.tabs.forEach(tab=>{
    const tlabel=tab.label.toUpperCase();
    /* DISCRETION tab – FDP > 2h, REST > 1h */
    if(tlabel.includes('DISCRETION')){
      tab.sections.forEach(sec=>{
        if(sec.type!=='table'||!sec.tbl) return;
        const typeIdx=sec.tbl.cols.findIndex(c=>(c.name||c.label||'').toUpperCase().includes('TYPE'));
        const discIdx=sec.tbl.cols.findIndex(c=>(c.name||c.label||"").toUpperCase().includes('DISCRETION USED'));
        if(typeIdx===-1||discIdx===-1) return;
        sec.tbl.rows.forEach(row=>{
          const type=String(row.cells[sec.tbl.cols[typeIdx].id]||'').trim().toUpperCase();
          const discRaw=String(row.cells[sec.tbl.cols[discIdx].id]||'').trim();
          if(!type||!discRaw) return;
          const parseMins=str=>{
            let t=0;
            /* hours: "3 hours", "3hrs", "1h", "01hr" */
            const hm=str.match(/(\d+)\s*h(?:ou?r?s?)?/i); if(hm) t+=parseInt(hm[1])*60;
            /* minutes: "10min", "29 mins", "10minutes" */
            const mm=str.match(/(\d+)\s*min/i); if(mm) t+=parseInt(mm[1]);
            /* colon format: "2:30" */
            if(t===0){const cm=str.match(/^(\d+):(\d{2})$/); if(cm) t=parseInt(cm[1])*60+parseInt(cm[2]);}
            /* bare number = minutes */
            if(t===0){const nm=str.match(/^(\d+)$/); if(nm) t=parseInt(nm[1]);}
            return t;
          };
          const mins=parseMins(discRaw);
          const flight=String(row.cells[sec.tbl.cols[0].id]||'').trim()||'Unknown';
          if(type==='FDP'&&mins>120) gcaaFlags.push({text:`DISCRETION – ${flight} | Type: FDP | Used: ${discRaw}`,flag:'SEND GCAA REPORT'});
          if(type==='REST'&&mins>60)  gcaaFlags.push({text:`DISCRETION – ${flight} | Type: REST | Used: ${discRaw}`,flag:'SEND GCAA REPORT'});
          /* LRV check — if LRV or NON LRV column contains "LRV" (but not "NON LRV") */
          const lrvIdx=sec.tbl.cols.findIndex(c=>(c.name||c.label||'').toUpperCase().includes('LRV'));
          if(lrvIdx!==-1){
            const lrvVal=String(row.cells[sec.tbl.cols[lrvIdx].id]||'').trim().toUpperCase();
            if(lrvVal==='LRV'){
              gcaaFlags.push({text:`DISCRETION – ${flight} | LRV`,flag:'SEND GCAA REPORT'});
            }
          }
        });
      });
    }
    /* SICK CREW tab – comments containing gcaa or complement (case-insensitive) */
    if(tlabel.includes('SICK')){
      tab.sections.forEach(sec=>{
        if(sec.type!=='table'||!sec.tbl) return;
        const commIdx=sec.tbl.cols.findIndex(c=>(c.name||c.label||"").toUpperCase().includes('COMMENT'));
        const staffIdx=sec.tbl.cols.findIndex(c=>(c.name||c.label||"").toUpperCase().includes('STAFF'));
        if(commIdx===-1) return;
        sec.tbl.rows.forEach(row=>{
          const comm=String(row.cells[sec.tbl.cols[commIdx].id]||'').trim();
          if(!comm) return;
          const lc=comm.toLowerCase();
          if(lc.includes('complement')||lc.includes('gcaa')){
            const staff=staffIdx!==-1?String(row.cells[sec.tbl.cols[staffIdx].id]||'').trim():'';
            gcaaFlags.push({text:`SICK CREW${staff?' – Staff #'+staff:''} | Comments: ${comm}`,flag:'CHECK CREW COMPLEMENT & SEND GCAA REPORT IF BELOW MINIMUM'});
          }
        });
      });
    }
  });
  const gcaaSect=(gcaaFlags||[]).length?['','⚠ GCAA / COMPLEMENT ALERTS:',...gcaaFlags.map(f=>`  ⚠ ${f.text} → [${f.flag}]`)]:[];
  const shiftNotesSect=[];
  /* ORB: append weather & ops risk summary if ORB data is available */
  /* orbRiskSect kept SEPARATE — included in email but NOT in the display body
     (the styled cards in buildOrbSection already show it visually on AI Summary tab) */
  const orbRiskSect = typeof buildOrbWeatherSummary === 'function' ? buildOrbWeatherSummary() : '';
  const body=[`Crew Services Handover – ${shiftTime}`,'','SHIFT SUMMARY:',shiftSummary,'','KEY HIGHLIGHTS:',...highlights.map(h=>`- ${h}`),...gcaaSect,...shiftNotesSect,'','OPS UPDATES:',...opsContent.map(x=>`- ${x}`),'','OPEN ITEMS BY PRIORITY:','HIGH:',...(high.length?high:['None']).map(x=>`- ${x}`),'','MEDIUM:',...(med.length?med:['None']).map(x=>`- ${x}`),'','LOW:',...(low.length?low:['None']).map(x=>`- ${x}`)].join('\n');
  return {delays,fdp,aog,sick,discretion,high,med,low,highlights,opsContent,gcaaFlags,actions,body,orbRiskSect,shiftSummary,shiftNotesLines};
}

function normalizePDFLine(line){
    let s=String(line||'');
    /* Replace narrow no-break space (\u202f) and non-breaking space (\u00a0) with regular space */
    s=s.replace(/[\u202f\u00a0]/g,' ');
    /* Collapse tabs and multiple spaces to single space */
    s=s.replace(/[\t ]+/g,' ').trim();
    /* Restore readable dash spacing */
    s=s.replace(/\s*[–\-]\s*/g,' – ');
    /* Collapse any remaining multiple spaces */
    s=s.replace(/ {2,}/g,' ').trim();
    return s;
  }
  /* ── Notes (plain text / bullet list) ── */

    if(!text||!text.trim()) return;
    const lines=String(text).split('\n');

      doc.setFont('helvetica','normal');
      doc.setFontSize(8.0);
      doc.setCharSpace(0);
      const wrapped=doc.splitTextToSize(clean,maxW);
      wrapped.forEach((wl,wi)=>{
        doc.setCharSpace(0);
        checkY(lineH);
        doc.setTextColor(255,255,255);

function buildShiftNotesBrief(lines){
  /* Score individual lines — no merging — pick top 5, each trimmed to ≤120 chars */
  const RULES=[
    {re:/aims.*down|downtime|outage|server/i,           score:10, tag:'SYSTEM'},
    {re:/gcaa|regulatory/i,                             score:10, tag:'REGULATORY'},
    {re:/strike|industrial.action/i,                    score:9,  tag:'DISRUPTION'},
    {re:/aog|unserviceable|grounded/i,                  score:9,  tag:'AIRCRAFT'},
    {re:/below.?min|minimum.comp|complement/i,           score:8,  tag:'COMPLIANCE'},
    {re:/discret/i,                                     score:8,  tag:'DISCRETION'},
    {re:/delay|delayed|\betd\b|\beta\b/i,               score:7,  tag:'DELAY'},
    {re:/fdp|violation|legality/i,                      score:7,  tag:'FDP'},
    {re:/runway.clos/i,                                 score:7,  tag:'OPS'},
    {re:/heavy.?crew|split.*pairing|pairing.*split/i,   score:6,  tag:'ROSTERING'},
    {re:/cargo|charter|dispatch.licen/i,                score:5,  tag:'CARGO'},
    {re:/sby|standby/i,                                 score:4,  tag:'STANDBY'},
    {re:/monitor|action|follow.?up|contact/i,           score:3,  tag:'ACTION'},
  ];
  const scored=[];
  lines.forEach(raw=>{
    const line=raw.replace(/^[\s•\u2022\-]+/,'').trim();
    if(!line || line.length<15) return;
    let score=0, tag='';
    for(const r of RULES){ if(r.re.test(line)){ if(r.score>score){score=r.score;tag=r.tag;} } }
    if(score===0) return; /* skip lines with no operational signal */
    /* trim to first sentence or 120 chars */
    let brief=line;
    const sentEnd=line.search(/\.\s|\?\s|!\s/);
    if(sentEnd>20) brief=line.slice(0,sentEnd+1);
    if(brief.length>120) brief=brief.slice(0,117)+'…';
    scored.push({brief, score, tag});
  });
  scored.sort((a,b)=>b.score-a.score);
  /* dedupe by tag — max 2 per tag to keep variety */
  const tagCount={};
  const top=[];
  for(const item of scored){
    tagCount[item.tag]=(tagCount[item.tag]||0)+1;
    if(tagCount[item.tag]<=2) top.push(item);
    if(top.length>=5) break;
  }
  return top;
}

  const box=wrap.querySelector("#ai-box-render");

      const sp=document.createElement("span");

      sp.textContent=ln; box.appendChild(sp);

function buildSection(tab, sec, si){
  const block=document.createElement('div'); block.className='sec-block';
  const hdr=document.createElement('div'); hdr.className='sec-hdr';
  const tog=document.createElement('button'); tog.className='sec-ctrl'; tog.textContent='▼'; let collapsed=false; tog.onclick=()=>{ collapsed=!collapsed; body.style.display=collapsed?'none':''; tog.textContent=collapsed?'▶':'▼'; }; hdr.appendChild(tog);
  const title=document.createElement('input'); title.className='sec-hdr-title'; title.value=sec.title||''; title.oninput=(e)=>{ sec.title=e.target.value; saveLocal(); }; hdr.appendChild(title);
  if(si>0){ const up=document.createElement('button'); up.className='sec-ctrl'; up.textContent='↑'; up.onclick=()=>{ snapshot(); [tab.sections[si-1],tab.sections[si]]=[tab.sections[si],tab.sections[si-1]]; saveLocal(); render(); }; hdr.appendChild(up);}  
  if(si<tab.sections.length-1){ const down=document.createElement('button'); down.className='sec-ctrl'; down.textContent='↓'; down.onclick=()=>{ snapshot(); [tab.sections[si],tab.sections[si+1]]=[tab.sections[si+1],tab.sections[si]]; saveLocal(); render(); }; hdr.appendChild(down);}  
  const del=document.createElement('button'); del.className='sec-ctrl del'; del.textContent='🗑'; del.onclick=()=>{ if(!confirm('Delete this section?')) return; snapshot(); tab.sections=tab.sections.filter(s=>s.id!==sec.id); saveLocal(); render(); }; hdr.appendChild(del);
  block.appendChild(hdr);
  const body=document.createElement('div');
  if(sec.type==='table') body.appendChild(buildTable(sec,tab));
  if(sec.type==='notes') body.appendChild(buildNotes(sec));
  if(sec.type==='items') body.appendChild(buildItems(sec));
  if(sec.type==='photos') body.appendChild(buildPhotos(sec,tab));
  if(sec.type==='ai') body.appendChild(buildAI(sec));
  if(sec.type==='looptasks') body.appendChild(buildLoopTasks(sec,tab));
  block.appendChild(body);
  return block;
}

function renderContent(){
  const c=document.getElementById('content'); c.innerHTML='';
  const tab=getTab(); if(!tab) return;
  tab.sections.forEach((sec,si)=> c.appendChild(buildSection(tab,sec,si)));
  /* ORB / WEATHER ADVISORIES: only visible on the AI SUMMARY tab */
  if(tab.label.toUpperCase()==='AI SUMMARY') c.appendChild(buildOrbSection());
  const addToTab=document.createElement('div'); addToTab.className='add-tab-row'; addToTab.innerHTML='<span class="label">ADD TO TAB:</span>';
  [['+ Table','table'],['+ Text Block','notes'],['+ Open Items','items'],['+ Photo Gallery','photos']].forEach(([label,type])=>{ const b=document.createElement('button'); b.className='btn btn-secondary small'; b.textContent=label; b.onclick=()=>{ snapshot(); addSectionToTab(tab.id,type); saveLocal(); render(); }; addToTab.appendChild(b); });
  c.appendChild(addToTab);
}
function render(){ renderShiftButtons(); renderTabs(); renderContent(); setTimeout(expandAllTextareas,0); updateUndoRedoBtns(); }
render();

    'YYZ','YVR','YUL','YYC','YEG','YOW','YHZ',
    'MEX','GDL','MTY','CUN',
    'GRU','GIG','FOR','SSA','REC','BSB','POA','MVD','SCL','LIM','BOG','MDE',
    'EZE','COR','MGA','SJO','PTY','HAV','SDQ','MBJ','POS','GEO',
    /* Indian Ocean */
    'MLE','GAN','SEZ','MRU','RUN','DZA',
    /* Known FIR / ICAO references commonly in ORBs */
    'SVO','LED','VKO','DME'
  ];

  /* ── Country / region name → representative station(s) mapping ──
     Used to extract political/security affected locations by name         */
  const countryToStation={
    'ISRAEL':'TLV','ISRAEL/PALESTINE':'TLV','TEL AVIV':'TLV','BEN GURION':'TLV',
    'LEBANON':'BEY','BEIRUT':'BEY',
    'JORDAN':'AMM','AMMAN':'AMM',
    'IRAQ':'BGW','BAGHDAD':'BGW','ERBIL':'EBL','BASRA':'BSR',
    'IRAN':'IKA','TEHRAN':'IKA','BANDAR ABBAS':'BND',
    'YEMEN':'SAH','HOUTHI':'SAH','SANAA':'SAH','HODEIDAH':'HOD',
    'SYRIA':'DAM','DAMASCUS':'DAM',
    'RUSSIA':'SVO','MOSCOW':'SVO','UKRAINE':'KBP','KYIV':'KBP',
    'KUWAIT':'KWI',
    'QATAR':'DOH','DOHA':'DOH',
    'SAUDI ARABIA':'RUH','JEDDAH':'JED','RIYADH':'RUH',
    'BAHRAIN':'BAH','MANAMA':'BAH',
    'OMAN':'MCT','MUSCAT':'MCT',
    'PAKISTAN':'ISB','ISLAMABAD':'ISB','KARACHI':'KHI','LAHORE':'LHE','PESHAWAR':'PEW',
    'AFGHANISTAN':'KBL','KABUL':'KBL',
    'INDIA':'DEL','MUMBAI':'BOM','BANGALORE':'BLR',
    'THAILAND':'BKK','BANGKOK':'BKK','PHUKET':'HKT',
    'CAMBODIA':'PNH','PHNOM PENH':'PNH',
    'KOREA':'ICN','NORTH KOREA':'ICN','SOUTH KOREA':'ICN',
    'JAPAN':'NRT','TOKYO':'NRT',
    'TURKEY':'IST','ISTANBUL':'IST','ANKARA':'ESB',
    'PORTUGAL':'LIS','LISBON':'LIS',
    'INDONESIA':'CGK','JAKARTA':'CGK','BALI':'DPS',
    'MALAYSIA':'KUL','KUALA LUMPUR':'KUL',
    'PHILIPPINES':'MNL','MANILA':'MNL',
    'STRAIT OF HORMUZ':'MCT','HORMUZ':'MCT',
    'WEST BANK':'TLV','GAZA':'TLV',
    'KURDISTAN':'EBL','KURDISH':'EBL',
    'HEZBOLLAH':'BEY','HAMAS':'TLV',
    'MYANMAR':'RGN','BURMA':'RGN'
  };

  const t=text.toUpperCase();
  const matches=new Set();

  /* 1. Direct IATA code scan */
  const iataRe=/\b([A-Z]{3})\b/g;
  let m;
  while((m=iataRe.exec(t))!==null){
    if(knownStations.includes(m[1])) matches.add(m[1]);
  }

  /* 2. Country / city name scan → map to representative station */
  Object.entries(countryToStation).forEach(([name,stn])=>{
    if(t.includes(name)) matches.add(stn);
  });

  return Array.from(matches);
}

/* ── Risk level classifier ── */
function classifyRisk(text){
  const t=text.toUpperCase();
  /* HIGH: airspace closure, armed conflict, terrorism, airport closure, extreme weather */
  const high=[
    /AIRSPACE.?CLOS|FIR.?CLOS/,/AIRPORT.?CLOS|AERODROME.?CLOS/,/RUNWAY.?CLOS/,
    /TERROR|TERRORISM/,/ARMED.?CONFLICT|ARMED.?ATTACK|ARMED.?CLASH/,
    /MISSILE|DRONE.?ATTACK|BALLISTIC|CRUISE.?MISSILE/,
    /STATE.?OF.?EMERGENCY|MARTIAL.?LAW|COUP/,
    /IDF|IRGC|HEZBOLLAH|HOUTHI/,
    /SHOOT.?DOWN|MISIDENTIF/,/NO.?FLY.?ZONE|NFZ/,
    /TSRA|SEVERE.?THUNDERSTORM/,/EVACUAT/,/DIVERT/,
    /SECURITY,\s*POLITICAL\s*UNRESTS|POLITICAL\s*UNRESTS/,
    /GEOPOLIT/,/STRAIT.?OF.?HORMUZ/,
    /PARTIALLY.?CLOS|PARTIAL.?CLOS/,
    /CIVIL.?WAR|CONFLICT.?ZONE/
  ];
  /* MEDIUM: protests, strikes, curfews, weather disruption, fuel issues, NOTAMs */
  const med=[
    /PROTEST|DEMONSTRAT/,/\bSTRIKE\b|INDUSTRIAL.?ACTION/,/\bCURFEW\b/,
    /UNREST|TENSION|INSTABILITY/,/SECURITY.?ALERT|THREAT.?LEVEL/,
    /LOW.?VIS|POOR.?VIS/,/\bFOG\b/,/\bSNOW\b|ICING/,/STRONG.?WIND|WIND.?SHEAR/,
    /\bTURBULENCE\b/,/\bHOLD.?FUEL|HOLDING.?FUEL/,/TANKERING/,
    /RUNWAY.?MAINT|RWY.?CLSD/,/\bNOTAM\b/,
    /FUEL.?SHORTAGE|FUEL.?LIMITATION/,/CRITICALLY.?OVERBOOK/,
    /RESTRICTED.?AREA|TFR\b/,/HEIGHTENED.?FLIGHT.?WATCH|FLIGHT.?WATCH/,
    /OVERBOOK|CAPACITY/,/CONTINGENCY.?FUEL/
  ];
  for(const p of high) if(p.test(t)) return 'HIGH';
  for(const p of med)  if(p.test(t)) return 'MEDIUM';
  return 'LOW';
}

/* ── Extract operational mitigations from text ── */
function extractMitigations(text){
  const t=text.toUpperCase();
  const found=[];
  /* Fuel actions — ORB uses specific phrases */
  if(/HOLDING.?FUEL|HOLD.?FUEL|\d+\s*MINS?\s*HOLD/.test(t))  found.push('Holding fuel planned');
  if(/TANKERING|TANKER.?SECTOR/.test(t))                       found.push('Tankering sector applied');
  if(/CONTINGENCY.?FUEL/.test(t))                              found.push('Contingency fuel uplifted');
  if(/EXTRA.?FUEL|ADDITIONAL.?FUEL|FUEL.?UPLIFT/.test(t))     found.push('Additional fuel uplift applied');
  if(/MINIMUM.?FUEL|MIN.?FUEL/.test(t))                        found.push('Minimum fuel reviewed');
  if(/REEVALUAT|RE.?EVALUAT/.test(t))                          found.push('Fuel plan to be re-evaluated');
  if(/CARRY.?SUFFICIENT.?FUEL/.test(t))                        found.push('Carry sufficient fuel for delay/diversion');
  /* Routing actions */
  if(/ALTERNATE.?ROUT|REROUTE|AMENDED.?ROUT|ROUTE.?ADJUST/.test(t)) found.push('Alternate routing applied');
  if(/ALTERNATE.?AIRPORT|ALT.?AIRPORT|DIVERT/.test(t))        found.push('Alternate airport filed');
  /* Crew / watch actions */
  if(/HEIGHTENED.?FLIGHT.?WATCH|FLIGHT.?WATCH/.test(t))       found.push('Heightened flight watch active');
  if(/CREW.?ALERT|CREW.?BRIEF|CREW.?NOTIF|CREW.?AWARE/.test(t)) found.push('Crew alerted and briefed');
  if(/DAYLIGHT.?OPS?.?ONLY|DAYLIGHT.?ONLY/.test(t))           found.push('Daylight operations only');
  /* NOTAM / ops actions */
  if(/NOTAM.*ISSUED|NOTAM.*PUBLISH|ISSUED.*NOTAM/.test(t))    found.push('NOTAM issued and actioned');
  if(/\bNOTAM\b/.test(t)&&!found.some(f=>f.includes('NOTAM'))) found.push('NOTAM reviewed');
  if(/SCHEDULE.?ADJUST|ADJUST.?SCHEDULE/.test(t))             found.push('Schedule adjusted');
  if(/NOT.?TO.?BE.?RELEAS.?EARLY|HOLD.?FOR.?SLOT/.test(t))   found.push('Slot protection applied — not to release early');
  /* Security actions */
  if(/SECURITY.?SCREEN|ENHANCED.?SCREEN/.test(t))             found.push('Enhanced security screening');
  if(/CRISIS.?DIRECT|MNO.?CALL|ESCALAT.?PROTO/.test(t))       found.push('Crisis management protocols activated');
  if(/NCIC|NCP\s*\d/.test(t))                                 found.push('Network Control emergency procedures followed');
  /* Monitoring */
  if(/NETWORK.?CONTROL.*MONITOR|NOC.*MONITOR|FD.*MONITOR/.test(t)) found.push('Network Control / FD monitoring');
  if(/EMBASSY|CONSULATE|LIAISON/.test(t))                     found.push('Embassy/authority liaison initiated');
  if(!found.length) found.push('Crew Services monitoring situation');
  return found;
}

/* ── Classify dominant advisory type (score-based, not first-match) ── */
function classifyType(text){
  const t=text.toUpperCase();
  const score={weather:0, political:0, security:0, ops:0};

  /* ── Weather signals ── */
  if(/\bTAF\b/.test(t))                     score.weather+=4;
  if(/\bMETAR\b/.test(t))                   score.weather+=4;
  if(/TEMPO\s+\d{4}\/\d{4}/.test(t))        score.weather+=5; /* ORB TAF format: TEMPO 2916/3002 */
  if(/TSRA|-TSRA/.test(t))                   score.weather+=4;
  if(/THUNDERSTORM/.test(t))                 score.weather+=3;
  if(/WIND.?SHEAR|WINDSHEAR/.test(t))        score.weather+=3;
  if(/\bBLDU\b|\bDSTSRA\b|\bDU\b/.test(t))  score.weather+=3; /* dust storm codes */
  if(/LOW.?VIS|POOR.?VIS|\/\d{4}\s/.test(t))score.weather+=2;
  if(/\bFOG\b|\bMIST\b|\bBR\b/.test(t))     score.weather+=2;
  if(/\bSNOW\b|\bICING\b/.test(t))          score.weather+=2;
  if(/\bTURB\b|TURBULENCE/.test(t))         score.weather+=2;
  if(/VRB\d+G\d+KT|\d+G\d+KT/.test(t))     score.weather+=2; /* wind gusts METAR format */
  if(/NETWORK.?WEATHER.?STATUS/.test(t))     score.weather+=3;
  if(/\bRA\b|\bSN\b|\bTS\b/.test(t))        score.weather+=1;
  if(/HOLDING.?FUEL|TANKERING/.test(t))      score.weather+=1;

  /* ── Political / Civil Unrest / Curfew signals ── */
  if(/SECURITY,\s*POLITICAL\s*UNRESTS|POLITICAL\s*UNRESTS,\s*PROTESTS/.test(t)) score.political+=10;
  if(/GEOPOLIT|GEOPOLITICAL/.test(t))        score.political+=6;
  if(/CIVIL.?UNREST|CIVIL.?DISORD/.test(t)) score.political+=5;
  if(/PROTEST|DEMONSTRAT/.test(t))           score.political+=5;
  if(/RIOT|RIOTING/.test(t))                 score.political+=5;
  if(/\bSTRIKE\b|INDUSTRIAL.?ACTION/.test(t))score.political+=4;
  if(/\bCURFEW\b/.test(t))                   score.political+=4;
  if(/COUP|MARTIAL.?LAW|STATE.?OF.?EMERGENCY/.test(t)) score.political+=5;
  if(/OSPREY.?SUMM|SITUATION.?UPDATE/.test(t))score.political+=5; /* ORB political section markers */
  if(/GEOPOLIT.?UPDATE/.test(t))             score.political+=6;
  if(/IDF|IRGC|HEZBOLLAH|HOUTHI|HAMAS/.test(t)) score.political+=5;
  if(/WEST.?BANK|GAZA|CEASEFIRE/.test(t))   score.political+=4;
  if(/AIRSPACE.?UPDATE|FIR.?OPEN|FIR.?CLOS/.test(t)) score.political+=2;
  if(/ESCALAT|HOSTILITIES/.test(t))         score.political+=3;
  if(/CONTINGENCY.?FUEL|HOLD.?FUEL.*BEY|HOLD.?FUEL.*TLV|HOLD.?FUEL.*SVO/.test(t)) score.political+=2;

  /* ── Security signals ── */
  if(/TERROR|TERRORISM/.test(t))             score.security+=6;
  if(/\bBOMB\b|EXPLOSION|IED/.test(t))       score.security+=6;
  if(/MISSILE|BALLISTIC|CRUISE.?MISSILE/.test(t)) score.security+=6;
  if(/DRONE.?ATTACK|ARMED.?DRONE/.test(t))   score.security+=5;
  if(/ARMED.?ATTACK|ARMED.?CLASH|ARMED.?CONFLICT/.test(t)) score.security+=5;
  if(/SHOOT.?DOWN|MISIDENTIF|SURFACE.?TO.?AIR/.test(t)) score.security+=6;
  if(/SECURITY.?ALERT|THREAT.?LEVEL|SECURITY.?WARNING/.test(t)) score.security+=5;
  if(/ASSASSINATION|KIDNAP|HOSTAGE/.test(t)) score.security+=5;
  if(/NO.?FLY.?ZONE|NFZ\b/.test(t))         score.security+=4;
  if(/IRGC|HOUTHI|IDF/.test(t))             score.security+=4;
  if(/WARNING.?SHOT|INTERCEPTION/.test(t))   score.security+=4;

  /* ── Ops / NOTAM signals ── */
  if(/\bNOTAM\b/.test(t))                   score.ops+=4;
  if(/RUNWAY.?CLOS|RWY.?CL|RWY.?NOT.?AVBL/.test(t)) score.ops+=5;
  if(/AIRPORT.?HOURS|HOUR.?OF.?OPS/.test(t))score.ops+=4;
  if(/TAXIWAY.?CLOS/.test(t))               score.ops+=4;
  if(/NAVAID|\bILS\b|\bVOR\b|\bNDB\b/.test(t)) score.ops+=3;
  if(/RESTRICTED.?AREA|\bTFR\b/.test(t))    score.ops+=3;
  if(/FUEL.?SHORTAGE|FUEL.?LIMITATION|FUEL.?SERVICE.?LIMITATION/.test(t)) score.ops+=4;
  if(/OVERBOOK|CAPACITY.?ISSUE/.test(t))    score.ops+=3;
  if(/MEL\b|DEFECT\b|INOPERATIVE/.test(t))  score.ops+=2;
  if(/RAMP.?RESOURCE|GROUND.?LOAD|GPU\b/.test(t)) score.ops+=2;

  const best=Object.entries(score).sort((a,b)=>b[1]-a[1])[0];
  return best[1]>0?best[0]:'general';
}

/* ── Generate a concise OCC-style summary from raw PDF text ── */
function generateOccSummary(text, stations, type, risk){
  const t=text.toUpperCase();
  const parts=[];
  if(type==='weather'||/WEATHER|TAF|METAR/.test(t)){
    const ph=[];
    if(/TSRA/.test(t)) ph.push('TSRA');
    if(/THUNDERSTORM/.test(t)&&!ph.length) ph.push('Thunderstorms');
    if(/LOW.?VIS|POOR.?VIS/.test(t)) ph.push('Low Visibility');
    if(/FOG|MIST/.test(t)) ph.push('Fog/Mist');
    if(/SNOW|BLIZZARD/.test(t)) ph.push('Snow/Ice');
    if(/STRONG.?WIND|GUST|CROSSWIND|WIND.?SHEAR/.test(t)) ph.push('Strong Winds');
    if(/TURB/.test(t)) ph.push('Turbulence');
    if(/HAIL/.test(t)) ph.push('Hail');
    if(ph.length) parts.push('Weather: '+ph.join(', '));
  }
  if(type==='political'||/UNREST|DEMONSTRAT|PROTEST|STRIKE/.test(t)){
    if(/DEMONSTRAT|PROTEST/.test(t)) parts.push('Demonstration/protest activity near airport');
    else if(/STRIKE|INDUSTRIAL.?ACTION/.test(t)) parts.push('Industrial strike action reported');
    else parts.push('Civil unrest reported');
  }
  if(type==='security'||/TERROR|SECURITY.?ALERT/.test(t)){
    if(/TERROR/.test(t)) parts.push('Counter-terrorism advisory in effect');
    else parts.push('Security threat advisory issued');
  }
  if(type==='ops'||/NOTAM|RUNWAY.?CLOS|CURFEW|AIRPORT.?CLOS/.test(t)){
    const ops=[];
    if(/RUNWAY.?CLOS|RWY.?CLOS/.test(t)) ops.push('Runway closure');
    if(/TAXIWAY.?CLOS/.test(t)) ops.push('Taxiway closure');
    if(/AIRPORT.?CLOS/.test(t)) ops.push('Airport closure');
    if(/CURFEW/.test(t)) ops.push('Curfew in effect');
    if(/NAVAID|ILS|VOR|NDB/.test(t)) ops.push('Navaid unserviceable');
    if(ops.length) parts.push('NOTAM/Ops: '+ops.join(', '));
    else if(/NOTAM/.test(t)) parts.push('Active NOTAM — review required');
  }
  const stn=stations.length?`[${stations.join('/')}] `:'';
  const summary=stn+(parts.join(' | ')||`${risk} risk advisory — review ORB for details`);
  return summary.charAt(0).toUpperCase()+summary.slice(1);
}

/* ── Per-station advisory breakdown (used in UI cards and email body) ── */
function buildStationAdvisories(orbEntry){
  /*
   * Parses the raw ORB PDF text and returns [{station, advisoryType, category, detail, actions}].
   *
   * Real Etihad ORB structure detected:
   *  1. NETWORK WEATHER STATUS  — TEMPO/TAF rows per station + flight holding/tankering notes
   *  2. METAR section           — raw METAR strings
   *  3. SECURITY, POLITICAL UNRESTS, PROTESTS AND CURFEW'S — free-text by country / region
   *  4. AIRPORT AND AIRSPACE RESTRICTIONS — per-station NOTAM / ops entries
   */
  const raw = (orbEntry.raw || '').toUpperCase();
  const globalMitigations = orbEntry.mitigations || [];
  const results = [];

  /* ── Action extractor ── */
  function getActions(ctx){
    const a=[];
    if(/\d+\s*MINS?\s*HOLD(?:ING)?\s*FUEL|HOLD(?:ING)?\s*FUEL/.test(ctx)) a.push('Holding fuel planned');
    if(/TANKER(?:ING)?\s*SECT/.test(ctx))      a.push('Tankering sector applied');
    if(/CONTINGENCY.?FUEL/.test(ctx))           a.push('Contingency fuel uplifted');
    if(/EXTRA.?FUEL|ADDITIONAL.?FUEL|FUEL.?UPLIFT/.test(ctx)) a.push('Additional fuel uplift applied');
    if(/CARRY.?SUFFICIENT.?FUEL/.test(ctx))     a.push('Carry sufficient fuel for delay/diversion');
    if(/REEVALUAT|RE.?EVALUAT/.test(ctx))       a.push('Fuel plan to be re-evaluated at TAF update');
    if(/ALTERNATE.?ROUT|REROUTE|AMENDED.?ROUT/.test(ctx)) a.push('Alternate routing applied');
    if(/ALTERNATE.?AIRPORT|ALT.?AIRPORT/.test(ctx)) a.push('Alternate airport filed');
    if(/HEIGHTENED.?FLIGHT.?WATCH|FLIGHT.?WATCH/.test(ctx)) a.push('Heightened flight watch active');
    if(/CREW.?ALERT|CREW.?BRIEF|CREW.?NOTIF/.test(ctx)) a.push('Crew alerted and briefed');
    if(/DAYLIGHT.?OPS?.?ONLY|DAYLIGHT.?ONLY/.test(ctx)) a.push('Daylight operations only');
    if(/NOT.?TO.?BE.?RELEAS.?EARLY/.test(ctx)) a.push('Slot protection — not to release early');
    if(/SECURITY.?SCREEN|ENHANCED.?SCREEN/.test(ctx)) a.push('Enhanced security screening');
    if(/CRISIS.?DIRECT|MNO\b|NCIC|NCP\s*\d/.test(ctx)) a.push('Crisis management / NOC protocols activated');
    if(/NOTAM/.test(ctx)&&!a.some(x=>x.includes('NOTAM'))) a.push('NOTAM reviewed and actioned');
    if(!a.length) globalMitigations.slice(0,3).forEach(m=>a.push(m));
    if(!a.length) a.push('Crew Services monitoring situation');
    return a;
  }

  /* ── TAF phenomenon extractor ── */
  function getTafPhenomena(ctx){
    const ph=[];
    if(/\bBLDU\b|\bDSTSRA\b|\bDU\b/.test(ctx))  ph.push('Dust storm / blowing dust');
    if(/TSRA|-TSRA/.test(ctx))                    ph.push('Thunderstorms (TSRA)');
    if(/THUNDERSTORM/.test(ctx)&&!ph.length)       ph.push('Thunderstorms');
    if(/WIND.?SHEAR|WINDSHEAR/.test(ctx))         ph.push('Wind shear');
    if(/\d+G\d+KT|VRB\d+G/.test(ctx))            ph.push('Strong/gusting winds');
    if(/\bRA\b|\bRAIN\b/.test(ctx))               ph.push('Rain');
    if(/\bBR\b|\bFG\b|\bFOG\b|\bMIST\b/.test(ctx)) ph.push('Fog / mist');
    if(/\bSN\b|\bSNOW\b/.test(ctx))               ph.push('Snow');
    if(/ICING/.test(ctx))                          ph.push('Icing conditions');
    if(/LOW.?VIS|POOR.?VIS|\/0[0-8]\d\d/.test(ctx)) ph.push('Low visibility');
    if(/\bTURB\b|TURBULENCE/.test(ctx))           ph.push('Turbulence');
    if(/\bHAIL\b/.test(ctx))                       ph.push('Hail');
    return ph;
  }

  /* ═══════════════════════════════════
     SECTION 1 — WEATHER (TAF / METAR)
  ═══════════════════════════════════ */
  var weatherStations = {};

  /* TEMPO lines: "RUH TEMPO 2916/3002 3000 DU" */
  var tempoRe = /\b([A-Z]{3})\s+TEMPO\s+\d{4}\/\d{4}\s+([^\n]{0,120})/g;
  var tm;
  while((tm = tempoRe.exec(raw)) !== null){
    var stn = tm[1]; var tafLine = tm[2];
    if(!weatherStations[stn]) weatherStations[stn]={phenomena:[], isMETAR:false, flightCtx:''};
    var ph = getTafPhenomena(tafLine);
    ph.forEach(function(p){ if(weatherStations[stn].phenomena.indexOf(p)<0) weatherStations[stn].phenomena.push(p); });
    weatherStations[stn].flightCtx += raw.substring(tm.index, Math.min(raw.length, tm.index+400));
  }

  /* METAR lines */
  var metarRe = /\bMETAR\s+([A-Z]{3,4})\s+([^\n]{0,200})/g;
  var mr;
  while((mr = metarRe.exec(raw)) !== null){
    var icao=mr[1]; var stnM=icao.length===4?icao.slice(1):icao;
    if(!weatherStations[stnM]) weatherStations[stnM]={phenomena:[], isMETAR:true, flightCtx:''};
    weatherStations[stnM].isMETAR=true;
    var ph2=getTafPhenomena(mr[2]);
    ph2.forEach(function(p){ if(weatherStations[stnM].phenomena.indexOf(p)<0) weatherStations[stnM].phenomena.push(p); });
  }

  /* Find flight actions near each weather station */
  Object.keys(weatherStations).forEach(function(stn){
    var data=weatherStations[stn];
    var flightRe=new RegExp('EY\\d+[^\\n]*(?:'+stn+')[^\\n]{0,150}','g');
    var fm;
    while((fm=flightRe.exec(raw))!==null) data.flightCtx+=fm[0]+' ';
    var cat=data.isMETAR?'metar':'weather';
    var advisoryType=data.isMETAR?'METAR Advisory':'Weather Advisory';
    var ph=data.phenomena;
    var detail=ph.length?ph.join(', '):'Weather conditions — check TAF/METAR';
    var actions=getActions(data.flightCtx||raw.substring(0,2000));
    results.push({station:stn, advisoryType:advisoryType, category:cat, detail:detail, actions:actions});
  });

  /* ═══════════════════════════════════════════════════════════
     SECTION 2 — POLITICAL / SECURITY / CURFEW
     Detected via the ORB section heading exact text
  ═══════════════════════════════════════════════════════════ */
  var C2S={
    'ISRAEL':'TLV','TEL AVIV':'TLV','BEN GURION':'TLV','LLBG':'TLV','WEST BANK':'TLV','GAZA':'TLV',
    'LEBANON':'BEY','BEIRUT':'BEY','HEZBOLLAH':'BEY',
    'JORDAN':'AMM',
    'IRAQ':'BGW','ERBIL':'EBL','KURDISTAN':'EBL','KURDISH':'EBL','BASRA':'BSR',
    'IRAN':'IKA','TEHRAN':'IKA','BANDAR ABBAS':'BND','IRGC':'IKA','BUSHEHR':'IKA',
    'STRAIT OF HORMUZ':'MCT','HORMUZ':'MCT',
    'YEMEN':'SAH','HOUTHI':'SAH',
    'SYRIA':'DAM',
    'RUSSIA':'SVO','UKRAINE':'KBP','NIZHNY NOVGOROD':'SVO',
    'KUWAIT':'KWI',
    'QATAR':'DOH',
    'SAUDI ARABIA':'RUH','JEDDAH':'JED',
    'BAHRAIN':'BAH',
    'OMAN':'MCT',
    'PAKISTAN':'ISB','KARACHI':'KHI','LAHORE':'LHE',
    'AFGHANISTAN':'KBL','DURAND LINE':'KBL',
    'THAILAND':'BKK','CAMBODIA':'PNH','KOREA':'ICN','NORTH KOREA':'ICN','JAPAN':'NRT',
    'TURKEY':'IST','PORTUGAL':'LIS'
  };

  /* Find political section */
  var polIdx=raw.search(/SECURITY,?\s*POLITICAL\s*UNRESTS?,?\s*PROTESTS?\s*AND\s*CURFEW/);
  if(polIdx>=0){
    var polEnd=raw.length;
    var nextIdx=raw.slice(polIdx+50).search(/\n(?:AIRPORT\s*AND\s*AIRSPACE|NETWORK\s*CONTROL\s*INSTRUCTIONS|TAC\s*ACTION|\+72\s*HOURS|AUH\s*HUB\s*OPERATIONAL)/);
    if(nextIdx>=0) polEnd=polIdx+50+nextIdx;
    var polText=raw.slice(polIdx, Math.min(polEnd, polIdx+8000));

    /* Also grab Network Control Instructions for actions */
    var nciIdx=polText.indexOf('NETWORK CONTROL INSTRUCTIONS');
    var nciCtx=nciIdx>=0?polText.slice(nciIdx,Math.min(polText.length,nciIdx+1000)):'';

    var seenPolStns={};
    Object.keys(C2S).forEach(function(name){
      if(polText.indexOf(name)<0) return;
      var stn=C2S[name];
      if(seenPolStns[stn]) return;
      seenPolStns[stn]=true;

      var nameIdx=polText.indexOf(name);
      var ctx=polText.slice(Math.max(0,nameIdx-100),Math.min(polText.length,nameIdx+600));

      var secScore=
        (/TERROR|MISSILE|BALLISTIC|DRONE.?ATTACK|ARMED.?ATTACK|SHOOT.?DOWN|BOMB\b/.test(ctx)?4:0)+
        (/IRGC|IDF|HEZBOLLAH|HOUTHI/.test(ctx)?3:0)+
        (/SECURITY.?ALERT|NO.?FLY|NFZ|INTERCEPTION|WARNING.?SHOT/.test(ctx)?3:0);
      var polScore=
        (/PROTEST|DEMONSTRAT|CIVIL.?UNREST|RIOT/.test(ctx)?4:0)+
        (/\bSTRIKE\b|INDUSTRIAL.?ACTION/.test(ctx)?3:0)+
        (/\bCURFEW\b/.test(ctx)?3:0)+
        (/GEOPOLIT|CEASEFIRE|ESCALAT|SITUATION.?UPDATE/.test(ctx)?2:0);

      var category,advisoryType;
      if(secScore>=polScore&&secScore>0){ category='security'; advisoryType='Security Advisory'; }
      else { category='political'; advisoryType='Political Unrest'; }

      var items=[];
      if(/MISSILE|BALLISTIC|CRUISE.?MISSILE/.test(ctx)) items.push('Missile/drone launches reported');
      if(/DRONE.?ATTACK|ARMED.?DRONE/.test(ctx))        items.push('Drone attack activity');
      if(/ARMED.?ATTACK|ARMED.?CLASH|ARMED.?CONFLICT/.test(ctx)) items.push('Armed conflict/clashes reported');
      if(/SHOOT.?DOWN|MISIDENTIF/.test(ctx))            items.push('Aircraft misidentification / shootdown risk');
      if(/IRGC|IRAN.*NAVY|IRGC.*NAVY/.test(ctx))        items.push('IRGC naval activity in region');
      if(/WARNING.?SHOT|INTERCEPTION/.test(ctx))         items.push('Warning shots / interception activity');
      if(/AIRSPACE.?CLOS|FIR.?CLOS|PARTIAL.*CLOS/.test(ctx)) items.push('Airspace / FIR partially or fully closed');
      if(/NOTAM/.test(ctx))                              items.push('Active NOTAMs in effect');
      if(/CEASEFIRE/.test(ctx))                          items.push('Ceasefire in effect — monitor for changes');
      if(/ESCALAT/.test(ctx))                            items.push('Escalation risk — situation developing');
      if(/PROTEST|DEMONSTRAT/.test(ctx))                 items.push('Protest / demonstration activity');
      if(/RIOT|RIOTING/.test(ctx))                       items.push('Civil unrest / rioting');
      if(/\bSTRIKE\b|INDUSTRIAL.?ACTION/.test(ctx))     items.push('Strike / industrial action');
      if(/\bCURFEW\b/.test(ctx))                        items.push('Curfew in effect');
      if(/GEOPOLIT/.test(ctx)&&!items.length)           items.push('Geopolitical advisory — ongoing monitoring');

      var detail=items.length?items.join(' | '):'Geopolitical advisory — heightened crew awareness required';
      var actions=getActions(ctx+' '+nciCtx);

      results.push({station:stn, advisoryType:advisoryType, category:category, detail:detail, actions:actions});
    });
  }

  /* ═══════════════════════════════════════════════════
     SECTION 3 — NOTAM / AIRPORT & AIRSPACE RESTRICTIONS
  ═══════════════════════════════════════════════════ */
  var notamIdx=raw.search(/AIRPORT\s*AND\s*AIRSPACE\s*RESTRICTIONS/);
  if(notamIdx>=0){
    var nsText=raw.slice(notamIdx, Math.min(raw.length, notamIdx+8000));
    var notamStns=new Set();

    /* Stations in "Affected Station" column */
    var affRe=/AFFECTED\s*STATION[^\n]*\n[^\n]*\n\s*([A-Z]{3})\b/g;
    var am2;
    while((am2=affRe.exec(nsText))!==null) notamStns.add(am2[1]);

    /* Stations near NOTAM keywords */
    var notamEntryRe=/\b([A-Z]{3})\b(?=[^\n]*(?:RUNWAY|RWY|ILS|NAVAID|CLOS|HOUR|FUEL.?SHORTAGE|FUEL.?LIMIT|OVERBOOK|INDUSTRIAL|STRIKE))/g;
    var ne2;
    while((ne2=notamEntryRe.exec(nsText))!==null){
      var c=ne2[1];
      /* Skip common false positives */
      if(!/^(EY|AIP|FIR|NOC|ATC|UTC|UFN|MON|TUE|WED|THU|FRI|SAT|SUN|OPS|TAF|TAC|PDF|APM|NCP|MNO|GPU|IFE|WIP|RMK|ALL|REF|DUE|FOR|VIA|EST)$/.test(c)) notamStns.add(c);
    }

    notamStns.forEach(function(stn){
      var stnIdx=nsText.indexOf(stn);
      if(stnIdx<0) return;
      var ctx=nsText.slice(Math.max(0,stnIdx-100),Math.min(nsText.length,stnIdx+800));
      var ops=[];
      if(/RUNWAY.?CLOS|RWY.?CL|RWY.?NOT.?AVBL|RWY.*CLSD/.test(ctx)) ops.push('Runway closure');
      if(/TAXIWAY.?CLOS/.test(ctx))                ops.push('Taxiway closure');
      if(/AIRPORT.?CLOS|AERODROME.?CLOS/.test(ctx)) ops.push('Airport/aerodrome closure');
      if(/AIRPORT.?HOURS|HOUR.?OF.?OPS/.test(ctx)) ops.push('Airport hours restriction');
      if(/\bILS\b/.test(ctx))                       ops.push('ILS shutdown');
      if(/NAVAID|\bVOR\b|\bNDB\b/.test(ctx))        ops.push('Navaid unserviceable');
      if(/RESTRICTED.?AREA|\bTFR\b/.test(ctx))      ops.push('Airspace restriction / TFR');
      if(/FUEL.?SHORTAGE|FUEL.?LIMITATION|FUEL.?SERVICE.?LIMIT/.test(ctx)) ops.push('Fuel service limitation');
      if(/INDUSTRIAL.?ACTION|\bSTRIKE\b/.test(ctx)) ops.push('Industrial strike / general strike');
      if(/OVERBOOK|CRITICALLY.?OVERBOOK/.test(ctx)) ops.push('Critically overbooking situation');
      if(/\bNOTAM\b/.test(ctx)&&!ops.length)        ops.push('Active NOTAM — review required');
      if(!ops.length) return;
      results.push({station:stn, advisoryType:'NOTAM / Ops', category:'notam',
        detail:ops.join(', '), actions:getActions(ctx)});
    });
  }

  /* ── Fallback: if nothing parsed, use entry globals ── */
  if(!results.length){
    var stns=orbEntry.stations&&orbEntry.stations.length?orbEntry.stations:['GENERAL'];
    stns.forEach(function(stn){
      results.push({
        station:stn,
        advisoryType:orbEntry.type==='political'?'Political Unrest':
                     orbEntry.type==='security'?'Security Advisory':
                     orbEntry.type==='ops'?'NOTAM / Ops':'Weather Advisory',
        category:orbEntry.type==='political'?'political':
                 orbEntry.type==='security'?'security':
                 orbEntry.type==='ops'?'notam':'weather',
        detail:orbEntry.summary||'Review ORB for details',
        actions:getActions(raw.slice(0,6000))
      });
    });
  }

  return results;
}


/* ── Deduplicate advisories: merge stations that share same detail + same actions ── */
function groupAdvisories(advList){
  /* Key = detail|action1|action2|…  →  merge stations into one entry */
  const map=new Map();
  advList.forEach(adv=>{
    const key=adv.detail+'||'+adv.actions.slice().sort().join('|');
    if(map.has(key)){
      const existing=map.get(key);
      if(!existing.stations.includes(adv.station)) existing.stations.push(adv.station);
    } else {
      map.set(key,{...adv, stations:[adv.station]});
    }
  });
  return Array.from(map.values());
}

/* ── Extract text from a PDF file using PDF.js (returns Promise<string>) ── */
async function extractPdfText(file){
  return new Promise((resolve, reject)=>{
    const reader=new FileReader();
    reader.onload=async function(ev){
      try{
        const arr=new Uint8Array(ev.target.result);
        if(typeof pdfjsLib==='undefined'){
          resolve('[PDF.js not loaded — text extraction unavailable]');
          return;
        }
        const pdf=await pdfjsLib.getDocument({data:arr}).promise;
        let fullText='';
        for(let i=1;i<=pdf.numPages;i++){
          const page=await pdf.getPage(i);
          const content=await page.getTextContent();
          const pageText=content.items.map(item=>item.str).join(' ');
          fullText+=pageText+'\n';
        }
        resolve(fullText);
      } catch(err){
        resolve('[Error reading PDF: '+err.message+']');
      }
    };
    reader.onerror=()=>resolve('[FileReader error]');
    reader.readAsArrayBuffer(file);
  });
}

/* ── Main ORB import handler ── */
document.getElementById('importOrbPdfInput').addEventListener('change', async function(e){
  const files=[...e.target.files];
  if(!files.length) return;

  /* Show processing indicator */
  const btn=document.querySelector('button.btn-orb');
  const origText=btn?btn.textContent:'';
  if(btn) btn.textContent='⏳ Processing…';

  let importedCount=0;
  for(const file of files){
    /* Skip non-PDF */
    if(!file.name.toLowerCase().endsWith('.pdf') && file.type!=='application/pdf') continue;

    try{
      const rawText=await extractPdfText(file);
      const stations=detectStations(rawText);
      const risk=classifyRisk(rawText);
      const type=classifyType(rawText);
      const mitigations=extractMitigations(rawText);
      const summary=generateOccSummary(rawText, stations, type, risk);

      /* Avoid duplicate imports of same filename */
      const existingIdx=orbSummaries.findIndex(s=>s.filename===file.name);
      const entry={
        id: uid(),
        filename: file.name,
        type, stations, risk, summary, mitigations,
        raw: rawText /* store full text — political/security sections can start after 8000+ chars */
      };
      if(existingIdx>=0) orbSummaries[existingIdx]=entry;
      else orbSummaries.push(entry);
      importedCount++;
    } catch(err){
      console.error('ORB import error for '+file.name+':', err);
    }
  }

  saveLocal();
  if(btn) btn.textContent=origText;
  e.target.value='';

  if(importedCount>0){
    render();
    /* Switch to AI Summary tab to show updated summary */
    const aiTab=state.tabs.find(t=>t.label.toUpperCase()==='AI SUMMARY');
    if(aiTab){ activeTabId=aiTab.id; render(); }
    alert(`✓ ${importedCount} ORB PDF${importedCount>1?'s':''} imported successfully.\n\nORB/Weather Advisories section has been updated.\nAI Summary now includes weather & ops risk data.`);
  } else {
    alert('No valid PDF files found to import.');
  }
});

/* ── Build the ORB / Weather Advisories section DOM (collapsible) ── */
function buildOrbSection(){
  const block=document.createElement('div');
  block.className='sec-block';
  block.id='orb-advisories-block';

  const hdr=document.createElement('div');
  hdr.className='sec-hdr';
  let orbCollapsed=false;
  const tog=document.createElement('button');
  tog.className='sec-ctrl'; tog.textContent='▼';
  const body=document.createElement('div');
  tog.onclick=()=>{ orbCollapsed=!orbCollapsed; body.style.display=orbCollapsed?'none':''; tog.textContent=orbCollapsed?'▶':'▼'; };
  hdr.appendChild(tog);
  const titleEl=document.createElement('input');
  titleEl.className='sec-hdr-title'; titleEl.value='ORB / WEATHER ADVISORIES'; titleEl.readOnly=true;
  hdr.appendChild(titleEl);
  const clearBtn=document.createElement('button');
  clearBtn.className='sec-ctrl del'; clearBtn.textContent='🗑';
  clearBtn.title='Clear all ORB advisories';
  clearBtn.onclick=()=>{ if(!confirm('Clear all imported ORB advisories?')) return; orbSummaries=[]; saveLocal(); render(); };
  hdr.appendChild(clearBtn);
  block.appendChild(hdr);

  body.className='sec-body';
  body.style.padding='10px 12px';

  /* helper: render one grouped/deduped advisory card */
  function renderCard(grp, risk){
    const card=document.createElement('div');
    card.className=`orb-card ${(risk||'low').toLowerCase()}`;
    card.style.marginBottom='8px';
    const topRow=document.createElement('div');
    topRow.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap';
    const badge=document.createElement('span');
    badge.className=`orb-risk-badge ${(risk||'low').toLowerCase()}`;
    badge.textContent=risk||'LOW';
    const typeLbl=document.createElement('span');
    typeLbl.style.cssText='font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em'; typeLbl.className='orb-type-lbl';
    typeLbl.textContent=grp.advisoryType;
    const stnLbl=document.createElement('span');
    stnLbl.style.cssText='font-size:11px;font-weight:700;color:#00d4ff;font-family:monospace;margin-left:auto';
    stnLbl.textContent='✈ '+grp.stations.join(' · ');
    topRow.appendChild(badge); topRow.appendChild(typeLbl); topRow.appendChild(stnLbl);
    card.appendChild(topRow);
    const detailEl=document.createElement('div');
    detailEl.style.cssText='font-size:12px;margin-bottom:6px;padding-left:2px'; detailEl.className='orb-detail-text';
    detailEl.textContent=grp.detail;
    card.appendChild(detailEl);
    const actTitle=document.createElement('div');
    actTitle.style.cssText='font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px'; actTitle.className='orb-act-title';
    actTitle.textContent='Actions taken:';
    card.appendChild(actTitle);
    const actList=document.createElement('ul');
    actList.style.cssText='margin:0;padding-left:16px;list-style:disc';
    grp.actions.forEach(a=>{ const li=document.createElement('li'); li.style.cssText='font-size:11px;line-height:1.6'; li.className='orb-act-item'; li.textContent=a; actList.appendChild(li); });
    card.appendChild(actList);
    return card;
  }

  /* helper: section heading */
  function sectionHeading(emoji, label, color){
    const h=document.createElement('div');
    h.style.cssText=`font-size:11px;font-weight:700;color:${color};text-transform:uppercase;letter-spacing:.07em;margin:14px 0 6px;border-bottom:1px solid #1e293b;padding-bottom:4px`;
    h.textContent=emoji+' '+label;
    return h;
  }

  /* helper: nil message */
  function nilMsg(msg){
    const d=document.createElement('div');
    d.style.cssText='font-size:11px;color:#475569;font-style:italic;padding:4px 2px';
    d.textContent=msg;
    return d;
  }

  if(!orbSummaries||!orbSummaries.length){
    const empty=document.createElement('div');
    empty.className='orb-empty';
    empty.innerHTML='No ORB advisories imported. Click <strong style="color:#00d4ff">&#x1F326; Import ORB</strong> to load PDF briefings.';
    body.appendChild(empty);
  } else {
    /* Gather all advisories from every ORB entry into 5 buckets */
    const cats={weather:[],metar:[],political:[],notam:[],security:[]};
    orbSummaries.forEach(entry=>{
      const advs=buildStationAdvisories(entry);
      advs.forEach(adv=>{
        const bucket=cats[adv.category]!==undefined?adv.category:'weather';
        cats[bucket].push({...adv, risk:entry.risk||'LOW'});
      });
    });

    /* Deduplicate: same detail + same actions → merge stations */
    const grpW=groupAdvisories(cats.weather);
    const grpM=groupAdvisories(cats.metar);
    const grpP=groupAdvisories(cats.political);
    const grpN=groupAdvisories(cats.notam);
    const grpS=groupAdvisories(cats.security);

    /* ── 🌩 WEATHER ALERTS ── */
    body.appendChild(sectionHeading('🌩','Weather Alerts','#60a5fa'));
    if(grpW.length) grpW.forEach(g=>body.appendChild(renderCard(g,g.risk)));
    else body.appendChild(nilMsg('No weather alerts in imported ORBs.'));

    /* ── 🌡 METAR ADVISORIES ── */
    body.appendChild(sectionHeading('🌡','METAR Advisories','#34d399'));
    if(grpM.length) grpM.forEach(g=>body.appendChild(renderCard(g,g.risk)));
    else body.appendChild(nilMsg('No METAR advisories in imported ORBs.'));

    /* ── ⚠ POLITICAL UNREST ── */
    body.appendChild(sectionHeading('⚠','Political Unrest','#f97316'));
    if(grpP.length) grpP.forEach(g=>body.appendChild(renderCard(g,g.risk)));
    else body.appendChild(nilMsg('No political/civil unrest advisories in imported ORBs.'));

    /* ── 📋 NOTAM / OPERATIONAL ── */
    body.appendChild(sectionHeading('📋','NOTAM / Operational','#a78bfa'));
    if(grpN.length) grpN.forEach(g=>body.appendChild(renderCard(g,g.risk)));
    else body.appendChild(nilMsg('No NOTAM/operational advisories in imported ORBs.'));

    /* ── 🔐 SECURITY (shown only if present) ── */
    if(grpS.length){
      body.appendChild(sectionHeading('🔐','Security Advisories','#f43f5e'));
      grpS.forEach(g=>body.appendChild(renderCard(g,g.risk)));
    }
  }

  /* Import button row */
  const importBtnRow=document.createElement('div');
  importBtnRow.style.cssText='margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center';
  const importBtn=document.createElement('button');
  importBtn.className='btn btn-orb small';
  importBtn.textContent='🌦 Import ORB PDF(s)';
  importBtn.onclick=()=>document.getElementById('importOrbPdfInput').click();
  importBtnRow.appendChild(importBtn);
  const hint=document.createElement('span');
  hint.style.cssText='font-family:monospace;font-size:9px;color:#64748b';
  hint.textContent='Select one or multiple ORB / operational briefing PDFs';
  importBtnRow.appendChild(hint);
  body.appendChild(importBtnRow);

  block.appendChild(body);
  return block;
}

/* ── Build ORB weather risk summary text for AI Summary & email body ── */
function buildOrbWeatherSummary(){
  if(!orbSummaries||!orbSummaries.length) return '';

  /* Collect all per-station advisories, bucketed by category */
  const cats={weather:[],metar:[],political:[],notam:[],security:[]};
  orbSummaries.forEach(entry=>{
    const advs=buildStationAdvisories(entry);
    advs.forEach(adv=>{
      const bucket=cats[adv.category]!==undefined?adv.category:'weather';
      cats[bucket].push({...adv, risk:entry.risk||'LOW'});
    });
  });

  /* Deduplicate: same detail + same actions → merge stations */
  const grpW=groupAdvisories(cats.weather);
  const grpM=groupAdvisories(cats.metar);
  const grpP=groupAdvisories(cats.political);
  const grpN=groupAdvisories(cats.notam);
  const grpS=groupAdvisories(cats.security);

  const sep='─'.repeat(42);
  const lines=['\n⚠ WEATHER & OPS RISK SUMMARY',sep];

  function renderGroup(label, groups){
    lines.push('\n'+label);
    if(groups.length){
      groups.forEach(g=>{
        lines.push(`  • ${g.stations.join(' / ')} — ${g.detail}`);
        lines.push(`    Actions: ${g.actions.join(' | ')}`);
      });
    } else {
      lines.push('  None reported in imported ORBs.');
    }
  }

  renderGroup('🌩 WEATHER ALERTS:', grpW);
  renderGroup('🌡 METAR ADVISORIES:', grpM);
  renderGroup('⚠ POLITICAL UNREST:', grpP);
  renderGroup('📋 NOTAM / OPERATIONAL:', grpN);
  if(grpS.length) renderGroup('🔐 SECURITY ADVISORIES:', grpS);

  lines.push('\n'+sep);
  return lines.join('\n');
}

window.getHandoverState = function(){ return state; };
window.setHandoverState = function(newState){ state=newState; window.state=state; saveLocal(); render(); };
window.updateDutyRoster = function(role, name){
  if(!state||!state.tabs) return false;
  for(var i=0;i<state.tabs.length;i++){
    var tab=state.tabs[i];
    if(!tab.label||tab.label.toUpperCase().indexOf('CREW ROSTER')===-1) continue;
    var secs=tab.sections||[];
    for(var j=0;j<secs.length;j++){
      var sec=secs[j];
      if(!sec.tbl||(sec.title||'').indexOf('Duty Roster')===-1) continue;
      var rows=sec.tbl.rows||[];
      for(var k=0;k<rows.length;k++){
        var cells=rows[k].cells||{};
        var cellRole=(cells['c0']||'').toLowerCase().trim();
        var matchRole=role.toLowerCase().trim();
        // Exact match or fuzzy match (role contains keyword or vice versa)
        var isMatch = cellRole===matchRole ||
          cellRole.indexOf(matchRole)>=0 ||
          matchRole.indexOf(cellRole)>=0 ||
          cellRole.replace(/\s+/g,'').indexOf(matchRole.replace(/\s+/g,''))>=0;
        if(isMatch){
          // Find the name column - second column key
          var colKeys=Object.keys(cells);
          if(colKeys.length>=2) cells[colKeys[1]]=name;
          else cells['c1']=name;
          saveLocal(); render(); return true;
        }
      }
    }
  }
  return false;
};
</script>
